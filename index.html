                ctx.strokeStyle = `rgba(200,40,255,${0.4 + 0.3 * pulse})`;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(Math.cos(ta) * r * 0.8, Math.sin(ta) * r * 0.8);
                ctx.quadraticCurveTo(
                  Math.cos(ta + 0.4) * len * 0.7, Math.sin(ta + 0.4) * len * 0.7,
                  Math.cos(ta) * len, Math.sin(ta) * len
                );
                ctx.stroke();
                ctx.restore();
              }
            }
            break;
          }
        }

        ctx.restore();

        // Freeze tint overlay
        if (frz && !fc) frzTint(0.35);

        // ── HP BAR (improved) ───────────────────────────────────────────────
        const bw = e.r * 2 + 10, bh = e.boss ? 10 : 5;
        const by = sy + e.r + (e.boss ? 8 : 5);
        const hf = Math.max(0, e.hp / e.maxHp);
        const hcol = hf > 0.6 ? '#28e050' : hf > 0.3 ? '#e0a020' : '#e02828';

        // Bar background with rounded feel
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.beginPath(); ctx.roundRect(sx - bw / 2, by, bw, bh, bh / 2); ctx.fill();

        // HP fill
        if (hf > 0) {
          const hg = ctx.createLinearGradient(sx - bw / 2, 0, sx - bw / 2 + bw * hf, 0);
          const hc2 = hf > 0.6 ? '#40ff70' : hf > 0.3 ? '#ffb030' : '#ff3030';
          hg.addColorStop(0, hcol);
          hg.addColorStop(1, hc2);
          ctx.fillStyle = hg;
          ctx.beginPath(); ctx.roundRect(sx - bw / 2, by, bw * hf, bh, bh / 2); ctx.fill();
          // Shine
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.beginPath(); ctx.roundRect(sx - bw / 2, by, bw * hf, bh * 0.45, bh / 2); ctx.fill();
        }

        if (e.boss) {
          ctx.strokeStyle = 'rgba(200,150,0,0.5)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(sx - bw / 2, by, bw, bh, bh / 2); ctx.stroke();
        }

        // Bomber 自爆红圈预警 (硬核动作游戏标配)
        if (e.type === 'bomber' && e.state === 'charge') {
          // 1. 地面红色危险圈
          ctx.save();
          ctx.globalAlpha = 0.2 + 0.2 * Math.sin(gameTime * 20);
          ctx.fillStyle = '#ff0000';
          ctx.beginPath(); ctx.arc(sx, sy, 140, 0, Math.PI * 2); ctx.fill(); // 140是自爆真实半径
          // 2. 致命的“收缩圈”动画
          ctx.globalAlpha = 0.6; ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(sx, sy, 140 * (1 - e.stateT), 0, Math.PI * 2); ctx.stroke();
          ctx.restore();

          // 3. 原本的头上进度条
          ctx.fillStyle = 'rgba(255,200,0,0.9)';
          ctx.beginPath(); ctx.roundRect(sx - bw / 2, by - 12, bw * Math.min(e.stateT, 1.0), 6, 2); ctx.fill();
          ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(sx - bw / 2, by - 12, bw, 6, 2); ctx.stroke();
        }

        // Boss 的激光瞄准线预警
        if (e.boss && e.phase >= 2) {
          const ba = Math.atan2(player.wy - e.wy, player.wx - e.wx);
          ctx.save();
          ctx.globalAlpha = 0.15 + 0.1 * Math.sin(t * 15);
          ctx.fillStyle = '#ff0000';
          ctx.translate(sx, sy); ctx.rotate(ba);
          // 画一个扇形的死亡射线框
          ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(800, -35); ctx.lineTo(800, 35); ctx.lineTo(0, 5); ctx.fill();
          ctx.restore();
        }

        // Affixes
        if (e.affixes && e.affixes.length > 0) {
          // Background tag
          const afxLabels = { shield: '盾', blink: '闪', split: '裂' };
          const afxColors = { shield: '#4080ff', blink: '#ffcc00', split: '#ff6080' };
          e.affixes.forEach((afix, ai) => {
            const ax = sx - e.r + ai * 24, ay = by - 20;
            ctx.fillStyle = afxColors[afix] || '#888';
            ctx.shadowBlur = 6; ctx.shadowColor = afxColors[afix] || '#888';
            ctx.beginPath(); ctx.roundRect(ax, ay, 22, 14, 3); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff'; ctx.font = 'bold 9px "Segoe UI"'; ctx.textAlign = 'center';
            ctx.fillText(afxLabels[afix] || '?', ax + 11, ay + 10);
          });

          // Shield aura
          if (e.shieldHits > 0) {
            const shAlpha = 0.4 + 0.3 * Math.sin(gameTime * 8);
            ctx.save();
            ctx.strokeStyle = `rgba(64,128,255,${shAlpha})`;
            ctx.lineWidth = 3; ctx.shadowBlur = 14; ctx.shadowColor = '#4080ff';
            ctx.beginPath(); ctx.arc(sx, sy, e.r + 13, 0, Math.PI * 2); ctx.stroke();
            // Hexagonal shield pattern
            ctx.strokeStyle = `rgba(140,200,255,${shAlpha * 0.5})`;
            ctx.lineWidth = 1; ctx.shadowBlur = 0;
            for (let hi = 0; hi < 6; hi++) {
              const ha = hi * Math.PI / 3 + gameTime * 0.5;
              ctx.beginPath();
              ctx.moveTo(sx + Math.cos(ha) * (e.r + 8), sy + Math.sin(ha) * (e.r + 8));
              ctx.lineTo(sx + Math.cos(ha + Math.PI / 3) * (e.r + 8), sy + Math.sin(ha + Math.PI / 3) * (e.r + 8));
              ctx.stroke();
            }
            ctx.restore();
            // Shield count
            ctx.fillStyle = '#c0d8ff'; ctx.font = 'bold 11px "Segoe UI"'; ctx.textAlign = 'left';
            ctx.fillText(`🛡${e.shieldHits}`, sx + e.r + 16, sy + 4);
          }
        }
      });
    }

    // ═══ 玩家角色专属绘制 (带骨骼律动与武器) ═══
    function drawPlayer() {
      const [sx, sy] = w2s(player.wx, player.wy);

      // --- 1. 底层特效层 (旋风、磁铁、护盾、无敌闪烁) ---
      if (player.whirl > 0 && !player.inMecha) { // 🤖 修复：机甲内隐藏旋风特效
        const wr = 82 + player.whirl * 18 + (player.evoStorm ? 120 : 0);
        ctx.save(); ctx.globalAlpha = .09 + .05 * Math.sin(gameTime * 4); ctx.strokeStyle = player.evoStorm ? '#80ffff' : '#80f080'; ctx.lineWidth = 2; ctx.setLineDash([6, 5]); ctx.beginPath(); ctx.arc(sx, sy, wr, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
      }
      if (player.magnetRange < 5000) { ctx.save(); ctx.globalAlpha = .03; ctx.strokeStyle = '#d4a820'; ctx.lineWidth = 1; ctx.setLineDash([3, 6]); ctx.beginPath(); ctx.arc(sx, sy, player.magnetRange, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); ctx.restore(); }
      if (player.shieldCd > 0) {
        ctx.save();
        if (player.shieldReady) { ctx.globalAlpha = .55 + .25 * Math.sin(gameTime * 7); ctx.strokeStyle = player.darkShield ? '#c080ff' : '#60c0ff'; ctx.lineWidth = 3.5; ctx.shadowBlur = 18; ctx.shadowColor = player.darkShield ? '#c080ff' : '#60c0ff'; ctx.beginPath(); ctx.arc(sx, sy, player.r + 16, 0, Math.PI * 2); ctx.stroke(); }
        else { const pct = player.shieldTimer / player.shieldCd; ctx.strokeStyle = 'rgba(96,192,255,.22)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(sx, sy, player.r + 16, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct); ctx.stroke(); }
        ctx.restore();
      }
      if (player.invincible > .05 && Math.floor(gameTime * 22) % 2 === 0) { ctx.save(); ctx.globalAlpha = .3; ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(sx, sy, player.r + 6, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }

      // --- 2. 英雄专属物理渲染层 ---

      // 🤖 绘制重装机甲
      if (player.inMecha) {
        ctx.save(); ctx.translate(sx, sy); ctx.rotate(player.angle + Math.PI / 2);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 5, 35, 25, 0, 0, Math.PI * 2); ctx.fill(); // 阴影
        ctx.fillStyle = '#202530'; ctx.fillRect(-28, -20, 12, 40); ctx.fillRect(16, -20, 12, 40); // 履带
        ctx.fillStyle = '#304050'; ctx.fillRect(-22, -15, 44, 30); // 主躯干
        ctx.fillStyle = '#101010'; // 加特林枪管
        ctx.fillRect(-28, -35, 6, 25); ctx.fillRect(-20, -35, 6, 25);
        ctx.fillRect(14, -35, 6, 25); ctx.fillRect(22, -35, 6, 25);
        ctx.shadowBlur = 10; ctx.shadowColor = '#40c0ff'; ctx.fillStyle = '#60d0ff'; // 驾驶舱
        ctx.beginPath(); ctx.ellipse(0, -5, 14, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // 机甲专属装甲血条
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(sx - 30, sy + 35, 60, 6);
        ctx.fillStyle = '#40c0ff'; ctx.fillRect(sx - 30, sy + 35, 60 * (player.mechaHp / player.mechaMaxHp), 6);
        ctx.restore(); return; // 机甲状态下跳过后续肉身的绘制
      }

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(player.angle + Math.PI / 2); // 旋转后，上方 (负Y) 即为面向敌人的方向

      // 通用地面阴影
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.beginPath(); ctx.ellipse(0, 4, player.r * 1.2, player.r * 0.8, 0, 0, Math.PI * 2); ctx.fill();

      const r = player.r;
      const t = gameTime;
      // 物理律动算法：模拟呼吸和跑步时的躯干起伏
      const breath = Math.sin(t * 8) * 1.5;
      const walkX = Math.cos(t * 15) * 2;
      const walkY = Math.sin(t * 15) * 2;

      if (meta.selChar === 'warrior') {
        // ⚔️ 草原武士 (重甲 + 巨剑 + 猩红披风)
        // 动态披风 (在身体底层)
        const capeWave = Math.sin(t * 6) * 4;
        ctx.fillStyle = '#a02010';
        ctx.beginPath();
        ctx.moveTo(-r * 0.6, 0);
        ctx.quadraticCurveTo(-r * 1.2 + capeWave, r * 1.8, -r * 0.8 + capeWave * 1.5, r * 2.2);
        ctx.lineTo(r * 0.8 + capeWave * 1.5, r * 2.2);
        ctx.quadraticCurveTo(r * 1.2 + capeWave, r * 1.8, r * 0.6, 0);
        ctx.fill();
        ctx.strokeStyle = '#601005'; ctx.lineWidth = 1; ctx.stroke();

        // 躯干重甲
        ctx.fillStyle = '#606570'; ctx.fillRect(-r * 0.8, -r * 0.5, r * 1.6, r);
        ctx.fillStyle = '#404550'; ctx.fillRect(-r * 0.5, -r * 0.5, r * 1.0, r);

        // 黄金肩甲 (带跑步起伏)
        ctx.fillStyle = '#b08020';
        ctx.beginPath(); ctx.ellipse(-r * 0.9, -r * 0.2 + walkY, r * 0.4, r * 0.5, 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(r * 0.9, -r * 0.2 - walkY, r * 0.4, r * 0.5, -0.2, 0, Math.PI * 2); ctx.fill();

        // 骑士头盔
        ctx.fillStyle = '#303540';
        ctx.beginPath(); ctx.arc(0, -r * 0.2 + breath, r * 0.65, 0, Math.PI * 2); ctx.fill();
        // V字发光面罩
        ctx.strokeStyle = '#ffe040'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(-r * 0.4, -r * 0.4 + breath); ctx.lineTo(0, -r * 0.7 + breath); ctx.lineTo(r * 0.4, -r * 0.4 + breath); ctx.stroke();

        // 巨剑 (右手持握，指向前方)
        ctx.save();
        ctx.translate(r * 0.8, -r * 0.2 - walkY);
        ctx.rotate(-0.2);
        ctx.fillStyle = '#b0b5c0'; // 剑刃
        ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-5, -r * 2.8); ctx.lineTo(0, -r * 3.4); ctx.lineTo(5, -r * 2.8); ctx.lineTo(2, 0); ctx.fill();
        ctx.fillStyle = '#ffd060'; // 剑格
        ctx.fillRect(-6, -r * 0.4, 12, 3);
        ctx.fillStyle = '#402010'; // 剑柄
        ctx.fillRect(-2, 0, 4, r * 0.6);
        ctx.restore();

      } else if (meta.selChar === 'priest') {
        // 🌿 森林祭司 (长袍 + 宝石法杖)
        // 飘逸的长袍底摆
        const robeWave = Math.sin(t * 4) * 3;
        ctx.fillStyle = '#2a5a30';
        ctx.beginPath(); ctx.ellipse(0, r * 0.5, r * 1.1, r * 0.8 + robeWave, 0, 0, Math.PI * 2); ctx.fill();

        // 祭司罩衫 (白绿相间)
        ctx.fillStyle = '#d0e0d0';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4a8a40';
        ctx.beginPath(); ctx.moveTo(-r * 0.4, -r * 0.5); ctx.lineTo(r * 0.4, -r * 0.5); ctx.lineTo(r * 0.6, r * 0.6); ctx.lineTo(-r * 0.6, r * 0.6); ctx.fill();

        // 兜帽与脸部
        ctx.fillStyle = '#e0c0a0';
        ctx.beginPath(); ctx.arc(0, -r * 0.2 + breath, r * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#d0e0d0';
        ctx.beginPath(); ctx.arc(0, -r * 0.2 + breath, r * 0.55, -0.2, Math.PI + 0.2); ctx.fill();

        // 翡翠法杖 (左手)
        ctx.save();
        ctx.translate(-r * 0.7, -r * 0.1 + walkY);
        ctx.fillStyle = '#6a4020'; // 木质杖身
        ctx.fillRect(-2, -r * 1.8, 4, r * 2.5);
        // 悬浮的顶端发光宝石
        ctx.shadowBlur = 15 + Math.sin(t * 10) * 5; ctx.shadowColor = '#40ff80';
        ctx.fillStyle = '#a0ffc0';
        ctx.beginPath(); ctx.moveTo(0, -r * 2.4); ctx.lineTo(-5, -r * 2.0); ctx.lineTo(0, -r * 1.7); ctx.lineTo(5, -r * 2.0); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();

      } else if (meta.selChar === 'hunter') {
        // 🏹 草原猎人 (夜行衣 + 双持连弩 + 兜帽隐匿)
        // 刺客披风
        ctx.fillStyle = '#304020';
        ctx.beginPath(); ctx.ellipse(0, r * 0.4, r * 0.9, r * 0.7, 0, 0, Math.PI * 2); ctx.fill();

        // 紧身劲装
        ctx.fillStyle = '#202518';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2); ctx.fill();

        // 深邃兜帽
        ctx.fillStyle = '#10150a';
        ctx.beginPath(); ctx.arc(0, -r * 0.2 + breath, r * 0.55, 0, Math.PI * 2); ctx.fill();
        // 黑暗中发光的猎人双眼
        ctx.fillStyle = '#ffc040'; ctx.shadowBlur = 5; ctx.shadowColor = '#ffc040';
        ctx.beginPath(); ctx.ellipse(-r * 0.2, -r * 0.3 + breath, 2, 1.5, -0.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(r * 0.2, -r * 0.3 + breath, 2, 1.5, 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        // 双持手弩 (随步伐交替前后摆动)
        ctx.fillStyle = '#505050'; // 弩身
        ctx.fillRect(-r * 0.8, -r * 1.2 + walkX, 4, r * 1.2);
        ctx.fillStyle = '#8a6a30'; ctx.fillRect(-r * 1.0, -r * 0.8 + walkX, 8, 3); // 弩弓臂

        ctx.fillStyle = '#505050'; // 右手弩
        ctx.fillRect(r * 0.6, -r * 1.2 - walkX, 4, r * 1.2);
        ctx.fillStyle = '#8a6a30'; ctx.fillRect(r * 0.4, -r * 0.8 - walkX, 8, 3); // 弩弓臂
      }

      ctx.restore();
    }

    function drawParticles() {
      for (let i = 0; i < particlePool.length; i++) {
        const p = particlePool[i];
        if (p.active && inView(p.wx, p.wy, p.r + 5)) {
          const [sx, sy] = w2s(p.wx, p.wy);
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(sx, sy, p.r * p.life, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    // ═══ 细节打磨：电竞级伤害跳字动效 ═══
    function drawDmgNums() {
      for (let i = 0; i < dmgNumPool.length; i++) {
        const d = dmgNumPool[i];
        if (d.active && inView(d.wx, d.wy, 30)) {
          const [sx, sy] = w2s(d.wx, d.wy);
          const p = d.life; // 寿命从 1 递减到 0

          ctx.save();
          ctx.translate(sx, sy);

          // 🌟 核心特效：刚出现时瞬间放大，然后逐渐缩回原大小
          let scale = 1;
          if (p > 0.8) scale = 1 + (1 - p) * 6; // 0.8~1.0 的瞬间爆炸放大
          else scale = 1 + (p / 0.8) * 0.3;     // 缓缓收缩

          ctx.scale(scale, scale);
          ctx.globalAlpha = p; // 渐隐消失

          ctx.textAlign = 'center';
          ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.8)';

          if (d.crit) {
            ctx.font = '900 16px "Segoe UI"';
            // 暴击渐变色
            const grad = ctx.createLinearGradient(0, -10, 0, 0);
            grad.addColorStop(0, '#ff4020'); grad.addColorStop(1, '#ffc020');
            ctx.fillStyle = grad;
            ctx.fillText(d.val + '!', 0, 0); // 暴击带感叹号
          } else {
            ctx.font = 'bold 12px "Segoe UI"';
            ctx.fillStyle = d.color || '#ffffff';
            ctx.fillText(d.val, 0, 0);
          }
          ctx.restore();
        }
      }
    }
    function drawWeather() {
      if (weather === 'clear') return;
      ctx.save();

      // 屏幕级氛围滤镜
      if (weather === 'heat') {
        ctx.fillStyle = 'rgba(255, 60, 0, 0.08)';
        ctx.fillRect(0, 0, W, H);
      } else if (weather === 'rain') {
        ctx.fillStyle = 'rgba(0, 40, 80, 0.15)'; // 阴沉滤镜
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = 'rgba(150, 200, 255, 0.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        weatherParticles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.l * 0.15, p.y + p.l); });
        ctx.stroke();
      } else if (weather === 'snow') {
        ctx.fillStyle = 'rgba(200, 230, 255, 0.1)'; // 冰寒滤镜
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        weatherParticles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); });
        ctx.fill();
      }
      ctx.restore();
    }

    // ═══ HUD ═══════════════════════════════════════════════════════════════════
    function rr(x, y, w, h, r = 5) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

    function drawHUD() {
      const p = 16;

      const sciBox = (x, y, w, h, cut1 = 10, cut2 = 10) => {
        ctx.beginPath();
        ctx.moveTo(x + cut1, y); ctx.lineTo(x + w, y);
        ctx.lineTo(x + w, y + h - cut2); ctx.lineTo(x + w - cut2, y + h);
        ctx.lineTo(x, y + h); ctx.lineTo(x, y + cut1);
        ctx.closePath();
      };

      // ✨ 智能防遮挡核心逻辑：计算玩家在屏幕上的视觉 Y 坐标
      const [psx, psy] = w2s(player.wx, player.wy);
      let topAlpha = 1.0;
      // 如果玩家走到屏幕上半部分（Y < 220），顶部 UI 会平滑褪色，绝不挡视野
      if (psy < 220) {
        topAlpha = Math.max(0.30, psy / 220);
      }

      // ==========================================
      // 以下为【顶部 UI】，受智能透明度控制
      // ==========================================
      ctx.save();
      ctx.globalAlpha = topAlpha;

      // --- 1. 左侧：玩家状态装甲板 (大幅度压扁) ---
      const lw = 225, lh = 78; // 原为 90
      ctx.fillStyle = 'rgba(8, 15, 6, 0.9)'; // 🚀 优化：直接用纯色替代每帧创建的渐变
      sciBox(p, p, lw, lh, 14, 0); ctx.fill();

      ctx.strokeStyle = 'rgba(138, 208, 48, 0.5)'; ctx.lineWidth = 1.5;
      ctx.shadowBlur = 10; ctx.shadowColor = '#8ad030'; ctx.stroke(); ctx.shadowBlur = 0;

      // HP 能量条
      const hf = Math.max(0, player.hp / player.maxHp);
      const hc = hf > .5 ? '#28dd58' : hf > .25 ? '#dda020' : '#dd2828';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; sciBox(p + 14, p + 16, 194, 12, 4, 4); ctx.fill();
      ctx.fillStyle = hc; sciBox(p + 14, p + 16, 194 * hf, 12, 4, 4); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 10px "Segoe UI", sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`HP  ${Math.ceil(player.hp)} / ${player.maxHp}${player.noHeal ? ' 🚫' : ''}`, p + 22, p + 26);

      // XP 经验条
      const xf = player.xp / player.xpNext;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; sciBox(p + 14, p + 36, 194, 5, 2, 2); ctx.fill();
      ctx.fillStyle = '#50e030'; ctx.shadowBlur = 8; ctx.shadowColor = '#50e030';

      // 局内遗物栏

        ctx.fillStyle = 'rgba(10, 20, 10, 0.85)'; sciBox(rrx, rry, relics.length * 36 + 15, 32, 6, 6); ctx.fill();

      // --- 5. 交互与提示弹窗优化 ---
      if (altarPromptT > 0 || shopPromptT > 0 || riftPromptT > 0 || mechaPromptT > 0) {

          ctx.fillStyle = '#60a0c0'; ctx.font = '11px "Segoe UI"'; ctx.fillText('接入火控系统，全功率扫射！', W / 2, ty + 42);
        } else if (riftPromptT > 0) {
          ctx.globalAlpha = riftPromptT;
          ctx.fillStyle = 'rgba(15, 0, 30, 0.92)'; sciBox(W / 2 - 160, ty, 320, 56, 12, 12); ctx.fill();
          ctx.strokeStyle = '#c040ff'; ctx.lineWidth = 2; ctx.stroke();
          ctx.fillStyle = '#d8a0ff'; ctx.font = '900 15px "Segoe UI"'; ctx.textAlign = 'center'; ctx.fillText('🌀 混沌秘境  [ 按 E 闯入 ]', W / 2, ty + 24);
          ctx.fillStyle = '#a070c0'; ctx.font = '11px "Segoe UI"'; ctx.fillText('45秒极限生存，高风险极高回报...', W / 2, ty + 42);
        } else if (shopPromptT > 0) {
          ctx.globalAlpha = shopPromptT;
          ctx.fillStyle = 'rgba(20, 30, 10, 0.92)'; sciBox(W / 2 - 160, ty, 320, 56, 12, 12); ctx.fill();
          ctx.strokeStyle = '#40ff40'; ctx.lineWidth = 2; ctx.stroke();
          ctx.fillStyle = '#80ff80'; ctx.font = '900 15px "Segoe UI"'; ctx.textAlign = 'center'; ctx.fillText('👺 地精黑市  [ 按 E 交易 ]', W / 2, ty + 24);
          ctx.fillStyle = '#60c060'; ctx.font = '11px "Segoe UI"'; ctx.fillText('有钱能使神推磨，透支灵石也无妨...', W / 2, ty + 42);
        } else {
          ctx.globalAlpha = altarPromptT;
          ctx.fillStyle = 'rgba(20, 5, 40, 0.92)'; sciBox(W / 2 - 160, ty, 320, 56, 12, 12); ctx.fill();
          ctx.strokeStyle = 'rgba(200, 120, 255, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
          if (nearAltar) {
            ctx.fillStyle = '#d8a0ff'; ctx.font = '900 15px "Segoe UI"'; ctx.textAlign = 'center'; ctx.fillText('🔮 神秘祭坛  [ 按 E 互动 ]', W / 2, ty + 24);
            ctx.fillStyle = '#a070c0'; ctx.font = '11px "Segoe UI"'; ctx.fillText('献祭 50% 生命，换取诅咒神器', W / 2, ty + 42);
          } else {
            const eg = compEggs.find(e => !e.hatched && dsq(player.wx, player.wy, e.wx, e.wy) < 120 * 120);
            if (eg) {
              const pct = eg.hatchT / 30; ctx.fillStyle = '#ffe060'; ctx.font = '900 15px "Segoe UI"'; ctx.textAlign = 'center';
              ctx.fillText(`🥚 孵化中 [ ${Math.floor(pct * 100)}% ]`, W / 2, ty + 24);

      // 💀 秘境生存倒计时 (正上方最醒目处)
      if (riftActive) {

      if (eventMsgT > 0) {
        const al = Math.min(eventMsgT, 1); ctx.save(); ctx.globalAlpha = al;
        ctx.fillStyle = 'rgba(10, 20, 10, 0.85)'; sciBox(W / 2 - 220, H - 90, 440, 36, 10, 10); ctx.fill();
        ctx.strokeStyle = 'rgba(212, 168, 32, 0.5)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = '#ffe060'; ctx.font = 'bold 14px "Segoe UI"'; ctx.textAlign = 'center'; ctx.fillText(eventMsg, W / 2, H - 67); ctx.restore();

      let evoX = W - p;

      // 🌌 绘制已激活的流派羁绊 (屏幕左侧靠下)
      if (activeSynergies.length > 0) {

        let syY = H - 80;
        activeSynergies.forEach(k => {
          const syn = SYNERGIES[k];
          ctx.fillStyle = 'rgba(10, 15, 20, 0.8)'; sciBox(p, syY, 180, 28, 4, 4); ctx.fill();
          ctx.strokeStyle = '#a080ff'; ctx.lineWidth = 1; ctx.stroke();
          ctx.fillStyle = '#e0c0ff'; ctx.font = 'bold 11px "Segoe UI"'; ctx.textAlign = 'left';
          ctx.fillText(syn.name, p + 10, syY + 18);

      // 📱 绘制虚拟摇杆 (只有触摸时才显示)
      if (joyActive) {

    // ═══ 战术面板 & 超武图鉴 (ESC 暂停菜单) ═══
    function drawPauseMenu() {
      ctx.save();
      // 深度背景模糊遮罩
      ctx.fillStyle = 'rgba(4, 12, 5, 0.9)';
      ctx.fillRect(0, 0, W, H);

      // 沿用电竞风切角UI画法
      const sciBox = (x, y, w, h, cut = 10) => {
        ctx.beginPath(); ctx.moveTo(x + cut, y); ctx.lineTo(x + w, y);
        ctx.lineTo(x + w, y + h - cut); ctx.lineTo(x + w - cut, y + h);
        ctx.lineTo(x, y + h); ctx.lineTo(x, y + cut); ctx.closePath();
      };

      const pW = 400, pH = 520;
      const leftX = W / 2 - pW - 20, rightX = W / 2 + 20;
      const startY = H / 2 - pH / 2 - 20;

      // ==========================================
      // 📊 左侧：伤害统计数据面板
      // ==========================================
      ctx.fillStyle = 'rgba(10, 25, 10, 0.85)'; sciBox(leftX, startY, pW, pH, 15); ctx.fill();
      ctx.strokeStyle = '#8ad030'; ctx.lineWidth = 1.5; ctx.stroke();

      ctx.fillStyle = '#8ad030'; ctx.font = '900 22px "Segoe UI"'; ctx.textAlign = 'center';
      ctx.fillText('📊 战局伤害分析', leftX + pW / 2, startY + 45);

      let totalDmg = Object.values(damageLog).reduce((a, b) => a + b, 0) || 1;
      let y = startY + 100;
      let sortedData = Object.entries(damageLog).sort((a, b) => b[1] - a[1]);

      ctx.font = 'bold 14px "Segoe UI"';
      sortedData.forEach(([name, dmg]) => {
        if (dmg <= 0) return;
        const barWidth = 200;
        const pct = dmg / totalDmg;

        ctx.textAlign = 'right'; ctx.fillStyle = '#a0c060'; ctx.fillText(name, leftX + 105, y);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; sciBox(leftX + 120, y - 12, barWidth, 14, 3); ctx.fill();

        const g = ctx.createLinearGradient(leftX + 120, 0, leftX + 120 + barWidth * pct, 0);
        g.addColorStop(0, '#5a9818'); g.addColorStop(1, '#d4a820');
        ctx.fillStyle = g; sciBox(leftX + 120, y - 12, barWidth * pct, 14, 3); ctx.fill();

        ctx.textAlign = 'left'; ctx.fillStyle = '#fff';
        ctx.fillText(`${Math.floor(dmg)} (${Math.round(pct * 100)}%)`, leftX + 130 + barWidth, y);
        y += 35;
      });

      // ==========================================
      // 📖 右侧：禁忌超武配方图鉴
      // ==========================================
      ctx.fillStyle = 'rgba(25, 15, 30, 0.85)'; sciBox(rightX, startY, pW, pH, 15); ctx.fill();
      ctx.strokeStyle = '#c080ff'; ctx.lineWidth = 1.5; ctx.stroke();

      ctx.fillStyle = '#c080ff'; ctx.font = '900 22px "Segoe UI"'; ctx.textAlign = 'center';
      ctx.fillText('📖 超武合成图鉴', rightX + pW / 2, startY + 45);

      if (!meta.discoveredEvos) meta.discoveredEvos = [];

      let ey = startY + 110;
      EVOS.forEach(ev => {
        const isUnlocked = meta.discoveredEvos.includes(ev.id);
        const reqKeys = Object.keys(ev.req);
        const item1 = UPGRADES.find(u => u.id === reqKeys[0]);
        const item2 = UPGRADES.find(u => u.id === reqKeys[1]);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        sciBox(rightX + 20, ey - 30, pW - 40, 66, 5); ctx.fill();

        ctx.textAlign = 'center';

        if (isUnlocked) {
          // ✅ 已解锁：全彩展示配方
          ctx.font = '28px sans-serif'; ctx.fillText(item1.icon, rightX + 60, ey);
          ctx.fillStyle = '#666'; ctx.font = 'bold 20px "Segoe UI"'; ctx.fillText('+', rightX + 100, ey - 6);
          ctx.font = '28px sans-serif'; ctx.fillText(item2.icon, rightX + 140, ey);

          ctx.fillStyle = '#ffd060'; ctx.font = 'bold 22px "Segoe UI"'; ctx.fillText('=', rightX + 185, ey - 5);

          ctx.font = '36px sans-serif'; ctx.shadowBlur = 15; ctx.shadowColor = '#ffd060';
          ctx.fillText(ev.icon, rightX + 235, ey + 4); ctx.shadowBlur = 0;

          ctx.textAlign = 'left';
          ctx.fillStyle = '#ffd060'; ctx.font = '900 16px "Segoe UI"'; ctx.fillText(ev.name, rightX + 270, ey - 8);
          ctx.fillStyle = '#a0a0a0'; ctx.font = '11px "Segoe UI"';
          ctx.fillText(ev.desc.substring(0, 11) + '...', rightX + 270, ey + 8);
        } else {
          // ❌ 未解锁：悬念展示
          ctx.font = '28px sans-serif'; ctx.fillText(item1.icon, rightX + 60, ey); // 透露核心武器
          ctx.fillStyle = '#666'; ctx.font = 'bold 20px "Segoe UI"'; ctx.fillText('+', rightX + 100, ey - 6);
          ctx.fillStyle = '#555'; ctx.font = '900 24px "Segoe UI"'; ctx.fillText('?', rightX + 140, ey - 4); // 隐藏副武器

          ctx.fillStyle = '#555'; ctx.font = 'bold 22px "Segoe UI"'; ctx.fillText('=', rightX + 185, ey - 5);

          ctx.fillStyle = '#333'; ctx.font = '900 30px "Segoe UI"'; ctx.fillText('???', rightX + 235, ey);

          ctx.textAlign = 'left';
          ctx.fillStyle = '#666'; ctx.font = '900 15px "Segoe UI"'; ctx.fillText('未知的禁忌力量', rightX + 270, ey - 8);
          ctx.fillStyle = '#444'; ctx.font = '11px "Segoe UI"'; ctx.fillText('在战斗中摸索配方...', rightX + 270, ey + 8);
        }
        ey += 80;
      });

    // ═══ DYNAMIC LIGHTING ═══
    function drawLighting() {
      // 设定 120 秒为一个完整昼夜循环 (50s白天 -> 10s黄昏 -> 50s黑夜 -> 10s黎明)
      const cycle = cycleTimer % 120;
      let nightAlpha = 0;
      if (cycle > 50 && cycle <= 60) nightAlpha = (cycle - 50) / 10 * 0.88; // 渐渐入夜
      else if (cycle > 60 && cycle <= 110) nightAlpha = 0.88;               // 深夜
      else if (cycle > 110) nightAlpha = 0.88 - (cycle - 110) / 10 * 0.88;  // 渐渐天明

      if (nightAlpha <= 0.02) return; // 大白天不需要画光影，节省性能

      // 1. 盖上黑布
      lctx.globalCompositeOperation = 'source-over';
      lctx.clearRect(0, 0, W, H);
      lctx.fillStyle = `rgba(2, 6, 12, ${nightAlpha})`;
      lctx.fillRect(0, 0, W, H);

      // 2. 准备“挖洞”
      lctx.globalCompositeOperation = 'destination-out';

      // 这是一个通用的画光晕辅助函数
      const drawLight = (wx, wy, r, intensity = 1) => {
        if (!inView(wx, wy, r)) return;
        const [sx, sy] = w2s(wx, wy);
        const g = lctx.createRadialGradient(sx, sy, 0, sx, sy, r);
        g.addColorStop(0, `rgba(0,0,0,${intensity})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        lctx.fillStyle = g;
        lctx.beginPath(); lctx.arc(sx, sy, r, 0, Math.PI * 2); lctx.fill();
      };

      // 🌟 玩家主光源 (带有微弱的呼吸感)
      const pLight = 180 + Math.sin(gameTime * 3) * 15;
      drawLight(player.wx, player.wy, pLight);

      // 🌟 宝箱和祭坛发光
      chests.forEach(c => drawLight(c.wx, c.wy, 140));
      altarsList.forEach(a => { if (!a.activated) drawLight(a.wx, a.wy, 110); });

      // 🌟 火焰与特效发光
      effects.forEach(ef => {
        if (ef.type === 'flame') drawLight(ef.wx, ef.wy, ef.r * 2.5);
        if (ef.type === 'ring') drawLight(ef.wx, ef.wy, ef.r * 1.5, 0.5);
      });

      // 🌟 处于“燃烧”状态的敌人、以及 Boss 自带微弱光芒
      enemies.forEach(e => {
        if (e.burnT > 0) drawLight(e.wx, e.wy, e.r * 5, 0.8);
        if (e.boss) drawLight(e.wx, e.wy, e.r * 4, 0.4);
      });

      // 🌟 子弹拖尾微光 (如果是火焰/雷电系可以更亮)
      // bullets.forEach(b => drawLight(b.wx, b.wy, b.r * 6, 0.3));
      // 只给可见范围内的子弹画光，且限制最多20个
      let bCount = 0;
      bullets.forEach(b => {
        if (bCount >= 20 || !inView(b.wx, b.wy, b.r + 5)) return;
        drawLight(b.wx, b.wy, b.r * 6, 0.3);
        bCount++;
      });

      // 3. 把这张“被挖出光晕的黑布”盖在主画面上
      ctx.drawImage(lightCanvas, 0, 0);
    }

    // ═══ MINIMAP (战术雷达) ═══
    function drawMinimap() {
      const mr = 65; // 雷达半径
      const mx = W - mr - 15; // 放在右上角信息板的下方
      const my = 175;
      const maxDist = 2800; // 雷达探测的世界范围（半径 2800 像素）
      const scale = mr / maxDist;

      ctx.save();
      // 1. 画雷达底盘
      ctx.fillStyle = 'rgba(4, 16, 4, 0.85)';
      ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#5a8a2a'; ctx.lineWidth = 2; ctx.stroke();

      // 2. 裁切范围，防止点画出界
      ctx.beginPath(); ctx.arc(mx, my, mr - 2, 0, Math.PI * 2); ctx.clip();

      // 绘制点的辅助函数 (clamp = true 时，超范围的点会卡在雷达边缘指引方向)
      const drawIcon = (wx, wy, color, size, clamp = false) => {
        let dx = wx - player.wx;
        let dy = wy - player.wy;
        let dist = Math.hypot(dx, dy);
        if (dist > maxDist && !clamp) return; // 距离太远且不需要指路的，直接不画
        if (dist > maxDist && clamp) {
          dx = (dx / dist) * (maxDist - 100); // 卡在雷达内圈边缘
          dy = (dy / dist) * (maxDist - 100);
        }
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(mx + dx * scale, my + dy * scale, size, 0, Math.PI * 2); ctx.fill();
      };

      // 画普通怪物 (红色小点，远了就不画)
      enemies.forEach(e => {
        if (!e.boss && !e.twin && e.type !== 'goldenSlime') drawIcon(e.wx, e.wy, '#ff4040', 1.5, false);
      });

      if (riftPortal) drawIcon(riftPortal.wx, riftPortal.wy, '#c020ff', 6, true, true);

      // 画神秘祭坛 (紫色点，边缘指路)
      altarsList.forEach(a => { if (!a.activated) drawIcon(a.wx, a.wy, '#c080ff', 3.5, true); });

      // 画宠物蛋 (黄色点，边缘指路)
      compEggs.forEach(e => { if (!e.hatched) drawIcon(e.wx, e.wy, '#ffd060', 3, true); });

      // 画宝箱 (金色点，边缘指路)
      chests.forEach(c => { drawIcon(c.wx, c.wy, '#ffdf00', 4, true); });

      if (mechaDrop) drawIcon(mechaDrop.wx, mechaDrop.wy, '#40c0ff', 5, true, true);

      // 画黑市商人 (绿色闪烁点)
      if (merchant && merchant.active) drawIcon(merchant.wx, merchant.wy, '#40ff40', 5, true, true);

      // 画 Boss 和 黄金史莱姆 (醒目大橙点，边缘指路)
      enemies.forEach(e => {
        if (e.boss || e.twin) drawIcon(e.wx, e.wy, '#ff6000', 4.5, true);
        if (e.type === 'goldenSlime') drawIcon(e.wx, e.wy, '#ffd700', 4, true);
      });

      // 画玩家自己 (中心绿点)
      ctx.fillStyle = '#40ff40'; ctx.shadowBlur = 8; ctx.shadowColor = '#40ff40';
      ctx.beginPath(); ctx.arc(mx, my, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;

      // 3. 扫描线动画特效
      const scanAngle = gameTime * 2.5;
      ctx.fillStyle = 'rgba(80, 255, 80, 0.15)';
      ctx.beginPath(); ctx.moveTo(mx, my); ctx.arc(mx, my, mr, scanAngle, scanAngle + 0.4); ctx.closePath(); ctx.fill();

      ctx.restore();
    }

      // 动态生成可选技能槽
      let choices = [{ id: 'base', name: '基础武器', icon: '⚔️', curr: player.runes.base }];
      if (player.whirl > 0) choices.push({ id: 'whirl', name: '旋风护体', icon: '🌀', curr: player.runes.whirl });
      if (player.orbs > 0) choices.push({ id: 'orbit', name: '环绕光球', icon: '💫', curr: player.runes.orbit });

      let cardsHtml = choices.map(c => `
            <div class="rc" onclick="socketRune('${c.id}', '${runeType}')" style="border-color:${c.curr ? '#6030a0' : '#40ff80'}; box-shadow: ${c.curr ? 'none' : '0 0 15px rgba(64,255,128,0.4)'}; margin: 0 10px;">
                <div style="font-size:36px;margin-bottom:12px;">${c.icon}</div>
                <div style="font-size:16px;color:#fff;font-weight:bold;margin-bottom:8px;">${c.name}</div>
                <div style="font-size:11px;color:#a0a0a0;background:rgba(0,0,0,0.5);padding:4px;border-radius:4px;">
                    当前: ${c.curr ? RUNE_DICT[c.curr].i + ' ' + RUNE_DICT[c.curr].n : '<span style="color:#40ff80">空槽位</span>'}
                </div>
            </div>
        `).join('');

      el.innerHTML = `
            <div style="font-size:42px;color:${rData.col};font-weight:900;text-shadow:0 0 20px ${rData.col};margin-bottom:15px;letter-spacing:6px;">发现远古晶体</div>
            <div style="font-size:80px;filter:drop-shadow(0 0 30px ${rData.col});margin-bottom:15px; animation: cardShine 3s infinite;">${rData.i}</div>
            <div style="font-size:28px;color:#fff;font-weight:bold;margin-bottom:8px;">${rData.n}</div>
            <div style="font-size:14px;color:#aaa;margin-bottom:40px;letter-spacing:2px;">${rData.d}</div>
            <div style="font-size:16px;color:#40ff80;margin-bottom:20px;letter-spacing:3px;">👇 请选择要产生变异的技能 👇</div>
            <div class="rcards" style="justify-content:center;">${cardsHtml}</div>
            <button class="btn" style="margin-top:40px;" onclick="document.getElementById('sRune').style.display='none'; gameState='game'; lastTs=null; requestAnimationFrame(loop);">放弃镶嵌</button>
        `;
      el.style.display = 'flex';
    }

    window.socketRune = function (skillId, runeType) {
      player.runes[skillId] = runeType;
      const sName = skillId === 'base' ? '基础武器' : skillId === 'whirl' ? '旋风护体' : '环绕光球';
      addEventMsg(`💎 镶嵌成功！[ ${sName} ] 发生了元素变异！`);
      document.getElementById('sRune').style.display = 'none';
      gameState = 'game'; lastTs = null; requestAnimationFrame(loop);
    }

    // ═══ SCREENS ═══════════════════════════════════════════════════════════════
    function showScr(id) { ['sMeta', 'sLvl', 'sEvo', 'sAltar', 'sDead', 'sChest'].forEach(s => { document.getElementById(s).className = 'scr' + (s === id ? '' : ' hide'); }); }


    // ═══ roundRect polyfill ═══
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r = 0) {
        const rr = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + rr, y);
        this.lineTo(x + w - rr, y);
        this.arcTo(x + w, y, x + w, y + rr, rr);
        this.lineTo(x + w, y + h - rr);
        this.arcTo(x + w, y + h, x + w - rr, y + h, rr);
        this.lineTo(x + rr, y + h);
        this.arcTo(x, y + h, x, y + h - rr, rr);
        this.lineTo(x, y + rr);
        this.arcTo(x, y, x + rr, y, rr);
        this.closePath();
        return this;
      };
    }

    // ═══ ENHANCED MINIMAP ═══
    // Override drawMinimap with a more polished version
    drawMinimap = function () {
      const mr = 68;
      const mx = W - mr - 15;
      const my = 185;
      const maxDist = 2800;
      const scale = mr / maxDist;

      ctx.save();

      // Outer decorative ring
      ctx.strokeStyle = 'rgba(138,208,48,0.18)';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(mx, my, mr + 6, 0, Math.PI * 2); ctx.stroke();

      // Background with radial gradient
      const rbg = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
      rbg.addColorStop(0, 'rgba(8,25,8,0.92)');
      rbg.addColorStop(1, 'rgba(2,10,2,0.98)');
      ctx.fillStyle = rbg;
      ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();

      // Grid lines inside radar
      ctx.strokeStyle = 'rgba(60,100,30,0.25)';
      ctx.lineWidth = 0.8;
      for (let ri = 1; ri <= 3; ri++) {
        ctx.beginPath(); ctx.arc(mx, my, mr * ri / 3, 0, Math.PI * 2); ctx.stroke();
      }
      for (let li = 0; li < 8; li++) {
        const la = li * Math.PI / 4;
        ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx + Math.cos(la) * mr, my + Math.sin(la) * mr); ctx.stroke();
      }

      // Border
      ctx.strokeStyle = '#5a9a2a'; ctx.lineWidth = 2;
      ctx.shadowBlur = 8; ctx.shadowColor = '#4a7a1a';
      ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowBlur = 0;

      // Clip to radar circle
      ctx.beginPath(); ctx.arc(mx, my, mr - 2, 0, Math.PI * 2); ctx.clip();

      const drawDot = (wx, wy, color, size, clamp = false, glow = false) => {
        let dx = wx - player.wx, dy = wy - player.wy;
        let dist = Math.hypot(dx, dy);
        if (dist > maxDist && !clamp) return;
        if (dist > maxDist && clamp) { dx = dx / dist * (maxDist - 80); dy = dy / dist * (maxDist - 80); }
        const px = mx + dx * scale, py = my + dy * scale;
        if (glow) { ctx.shadowBlur = 8; ctx.shadowColor = color; }
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(px, py, size, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        // Arrow tip for clamped targets at edge
        if (clamp && dist > maxDist) {
          const edgeDist = mr - 6;
          const epx = mx + (dx / Math.hypot(dx, dy)) * edgeDist;
          const epy = my + (dy / Math.hypot(dx, dy)) * edgeDist;
          const aa = Math.atan2(dy, dx);
          ctx.fillStyle = color + 'cc';
          ctx.save(); ctx.translate(epx, epy); ctx.rotate(aa);
          ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(-4, -3.5); ctx.lineTo(-4, 3.5); ctx.closePath(); ctx.fill();
          ctx.restore();
        }
      };

      // Swamp areas
      swamps.forEach(s => {
        let dx = s.wx - player.wx, dy = s.wy - player.wy;
        if (Math.hypot(dx, dy) < maxDist) {
          ctx.fillStyle = 'rgba(40,70,20,0.35)';
          ctx.beginPath(); ctx.arc(mx + dx * scale, my + dy * scale, Math.max(4, s.r * scale), 0, Math.PI * 2); ctx.fill();
        }
      });

      // 💎 画符文 (对应符文的专属颜色)
      if (typeof runesDrop !== 'undefined') {
        runesDrop.forEach(r => {
          const col = RUNE_DICT[r.type] ? RUNE_DICT[r.type].col : '#fff';
          drawDot(r.wx, r.wy, col, 4.5, true, true);
        });
      }

      // ✨ 画守护水晶
      if (typeof crystal !== 'undefined' && crystal) {
        drawDot(crystal.wx, crystal.wy, '#30d8ff', 5.5, true, true);
      }

      // Regular enemies (subtle)
      enemies.forEach(e => {
        if (!e.boss && !e.twin && e.type !== 'goldenSlime' && e.shape !== 'tree') {
          drawDot(e.wx, e.wy, '#ff5050', 1.8, false, false);
        }
      });

      // Companion eggs
      compEggs.forEach(eg => { if (!eg.hatched) drawDot(eg.wx, eg.wy, '#ffd060', 3.5, true, true); });

      // Altars
      altarsList.forEach(a => { if (!a.activated) drawDot(a.wx, a.wy, '#c080ff', 4, true, true); });

      // Chests
      chests.forEach(c => drawDot(c.wx, c.wy, '#ffe030', 4.5, true, true));

      // Boss, golden slime, and World Tree
      enemies.forEach(e => {
        if (e.shape === 'tree') drawDot(e.wx, e.wy, '#ff0050', 6.5, true, true); // 世界树专属大红点
        else if (e.boss || e.twin) drawDot(e.wx, e.wy, '#ff5500', 5.5, true, true);
        else if (e.type === 'goldenSlime') drawDot(e.wx, e.wy, '#ffd700', 5, true, true);
      });

      // Player (center)
      const playerPulse = 0.6 + 0.4 * Math.sin(gameTime * 5);
      ctx.fillStyle = `rgba(64,255,64,${playerPulse})`;
      ctx.shadowBlur = 10; ctx.shadowColor = '#40ff40';
      ctx.beginPath(); ctx.arc(mx, my, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      // Player direction indicator
      ctx.strokeStyle = '#40ff40'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(mx + Math.cos(player.angle) * 6, my + Math.sin(player.angle) * 6);
      ctx.lineTo(mx + Math.cos(player.angle) * 13, my + Math.sin(player.angle) * 13);
      ctx.stroke();

      // Scanning sweep
      const scanA = gameTime * 2.5;
      const scanG = ctx.createConicalGradient ? null : null; // fallback
      ctx.fillStyle = 'rgba(80,255,80,0.12)';
      ctx.beginPath(); ctx.moveTo(mx, my); ctx.arc(mx, my, mr, scanA, scanA + 0.5); ctx.closePath(); ctx.fill();

      ctx.restore();

      // Radar label
      ctx.fillStyle = 'rgba(80,140,40,0.8)';
      ctx.font = 'bold 9px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.fillText('RADAR', mx, my + mr + 14);
    };

    buildMetaUI(); showScr('sMeta'); gameState = 'meta';
    ctx.fillStyle = '#3a8018'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(0,0,0,.75)'; ctx.fillRect(0, 0, W, H);
  </script>
</body>
