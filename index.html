<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>Grassland Legend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #080c05;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      /* 换用更现代、干脆的游戏字体族 */
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
      color: #e8eaed;
    }

    /* 定制游戏风格滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #5a8a2a;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8ad030;
    }

    #wrap {
      position: relative;
      border: 4px solid #2a3a1a;
      border-radius: 8px;
      /* 屏幕圆角 */
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(138, 208, 48, 0.2);
      overflow: hidden;
    }

    canvas {
      display: block;
      /* filter: contrast(1.05) saturate(1.1); */
      /* 📱 封死移动端的所有默认手势 (缩放、下拉刷新、长按菜单) */
      touch-action: none;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 🧊 核心大招：毛玻璃 UI 遮罩 */
    .scr {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8, 14, 6, 0.65) !important;
      /* 半透明底色 */
      backdrop-filter: blur(12px);
      /* 动态模糊背后的游戏画面 */
      -webkit-backdrop-filter: blur(12px);
      pointer-events: all;
      overflow-y: auto;
      padding: 30px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(1.05);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .scr.hide {
      display: none;
    }

    .hide {
      display: none !important;
    }

    h1 {
      font-family: 'Georgia', serif;
      /* 标题保留衬线体，更有史诗感 */
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(to bottom, #ffe880, #d4a820, #8a6010);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 15px rgba(212, 168, 32, 0.4));
      letter-spacing: 12px;
      margin-bottom: 0px;
    }

    h2 {
      font-size: 14px;
      letter-spacing: 14px;
      color: #8ad030;
      text-shadow: 0 0 10px rgba(138, 208, 48, 0.5);
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    /* 🎮 按钮质感优化 */
    .btn {
      padding: 12px 48px;
      background: linear-gradient(180deg, #5a9818 0%, #3a6a0a 100%);
      border: 1px solid #8ad030;
      color: #e8ffb0;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 4px;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.3);
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      /* 弹性悬浮 */
      margin: 6px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .btn:hover {
      background: linear-gradient(180deg, #7ab830 0%, #4a8010 100%);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 25px rgba(138, 208, 48, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.4);
      border-color: #a0f040;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }

    .btng {
      background: linear-gradient(180deg, #c89018, #886010);
      border-color: #ffd060;
      color: #fff8d0;
    }

    .btng:hover {
      background: linear-gradient(180deg, #e0a820, #a07010);
      box-shadow: 0 10px 25px rgba(212, 168, 32, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.4);
      border-color: #ffe080;
    }

    .btnr {
      background: linear-gradient(180deg, #982020, #6a1010);
      border-color: #e05050;
      color: #ffe0e0;
    }

    .btnr:hover {
      background: linear-gradient(180deg, #b82828, #801818);
      box-shadow: 0 10px 25px rgba(224, 80, 80, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.4);
      border-color: #ff8080;
    }

    .btnsm {
      padding: 6px 16px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* 🗂️ 标签页优化 */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 4px;
      border-radius: 8px;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.8);
    }

    .tab {
      padding: 8px 32px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #6a9a4a;
      background: transparent;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab:hover {
      color: #8ad030;
      background: rgba(255, 255, 255, 0.05);
    }

    .tab.on {
      background: linear-gradient(180deg, #3a6a1a, #1a3a0a);
      color: #ffd060;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      text-shadow: 0 0 8px rgba(212, 168, 32, 0.4);
    }

    /* 🃏 卡片质感全面升级 (选人、升级、宝箱、祭坛) */
    .cr,
    .cards,
    .rcards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 880px;
      margin-bottom: 20px;
    }

    .cc,
    .card,
    .rc {
      position: relative;
      background: linear-gradient(160deg, rgba(30, 40, 20, 0.9), rgba(10, 15, 5, 0.95));
      border: 1px solid #3a5a1a;
      border-top-color: #5a7a3a;
      /* 顶部高光 */
      border-radius: 12px;
      padding: 18px 14px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1.1);
      /* 高级Q弹感 */
    }

    .cc {
      width: 165px;
    }

    .card {
      width: 145px;
    }

    .rc {
      width: 170px;
      background: linear-gradient(160deg, rgba(40, 20, 60, 0.9), rgba(15, 5, 25, 0.95));
      border-color: #5a2080;
      border-top-color: #8a40c0;
    }

    /* 悬浮发光特效 */
    .cc:not(.lk):hover,
    .card:not(.evo):hover {
      border-color: #8ad030;
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(138, 208, 48, 0.3);
      z-index: 10;
    }

    .rc:hover {
      border-color: #c080ff;
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(192, 128, 255, 0.4);
    }

    .cc.sel {
      border-color: #a0f040;
      background: linear-gradient(160deg, rgba(40, 70, 20, 0.95), rgba(20, 40, 10, 0.95));
      box-shadow: 0 0 20px rgba(138, 208, 48, 0.3);
    }

    .cc.lk {
      filter: grayscale(100%) opacity(0.5);
      cursor: not-allowed;
    }

    .lkb {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      font-weight: bold;
      color: #ffd060;
      background: rgba(0, 0, 0, 0.7);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #5a4a1a;
    }

    /* 超武金边闪烁卡片 */
    .card.evo {
      border-color: #d4a820;
      border-top-color: #ffe080;
      background: linear-gradient(160deg, rgba(60, 45, 10, 0.9), rgba(20, 15, 5, 0.95));
      box-shadow: 0 0 15px rgba(212, 168, 32, 0.3);
    }

    .card.evo:hover {
      border-color: #ffe060;
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 25px rgba(212, 168, 32, 0.6);
    }

    /* ✨ 天赋树与图鉴优化 */
    .tg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 20px;
    }

    .tr,
    .be {
      background: rgba(10, 20, 8, 0.75);
      border: 1px solid #2a4a1a;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .tr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
    }

    .tr:hover {
      background: rgba(20, 40, 15, 0.85);
      border-color: #4a7a2a;
    }

    .dots {
      display: flex;
      gap: 4px;
      margin: 6px 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid #1a3a0a;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    .dot.on {
      background: linear-gradient(135deg, #8ad030, #4a8010);
      border-color: #a0f040;
      box-shadow: 0 0 8px rgba(138, 208, 48, 0.4);
    }

    .bestiary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 780px;
    }

    .be {
      padding: 14px 10px;
      text-align: center;
    }

    .be.lit {
      border-color: #5a8a2a;
      background: linear-gradient(180deg, rgba(20, 40, 10, 0.8), rgba(10, 20, 5, 0.9));
    }

    /* 💀 结算面板优化 */
    .sg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .st {
      text-align: center;
      padding: 16px;
      background: linear-gradient(180deg, rgba(20, 30, 15, 0.8), rgba(10, 15, 8, 0.95));
      border: 1px solid #3a5a2a;
      border-radius: 8px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
    }

    /* 🌟 全局光影优化：所有文字带高级阴影，提升辨识度 */
    * {
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.85);
    }

    /* 🖱️ 游戏专属电竞光标 */
    body {
      cursor: crosshair;
    }

    /* ✨ UI卡片高级质感：扫光动画特效 (流光溢彩) */
    .card,
    .rc,
    .cc {
      overflow: hidden;
      position: relative;
      border-width: 2px !important;
    }

    .card::before,
    .rc::before,
    .cc::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0));
      transform: skewX(-25deg);
      animation: cardShine 5s infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes cardShine {
      0% {
        left: -100%;
      }

      15% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    /* ❤️ 低血量全屏心跳警告 */
    @keyframes lowHpPulse {
      0% {
        box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.2);
        border-color: rgba(255, 0, 0, 0.5);
      }

      50% {
        box-shadow: inset 0 0 120px rgba(255, 0, 0, 0.6);
        border-color: rgba(255, 0, 0, 1);
      }

      100% {
        box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.2);
        border-color: rgba(255, 0, 0, 0.5);
      }
    }

    .danger-border {
      animation: lowHpPulse 1s infinite;
    }

    /* 🎁 图标放大悬浮动效 */
    .card div:first-child,
    .rc div:first-child,
    .cc div:first-child {
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1.2);
    }

    .card:hover div:first-child,
    .rc:hover div:first-child,
    .cc:not(.lk):hover div:first-child {
      transform: scale(1.35) translateY(-5px);
    }
  </style>

<body>
  <div id="wrap"><canvas id="c"></canvas>
    <!-- META -->
    <div class="scr" id="sMeta">
      <h1>Grassland Legend</h1>
      <h2>aqiangge112@gmail.com</h2>
      <div style="color:#ffd060;font-size:16px;margin-bottom:10px;" id="mGold">💰 0 灵石</div>
      <div class="tabs">
        <div class="tab on" id="tChars" onclick="metaTab('chars')">⚔ 英雄</div>
        <div class="tab" id="tTalents" onclick="metaTab('talents')">⭐ 天赋</div>
        <div class="tab" id="tBestiary" onclick="metaTab('bestiary')">📖 图鉴</div>
        <div class="tab" id="tRelics" onclick="metaTab('relics')">🏛️ 圣物</div>
      </div>
      <div id="mChars" class="cr"></div>
      <div id="mTalents" class="tg hide"></div>
      <div id="mBestiary" class="bestiary hide"></div>
      <div id="mRelics" class="bestiary hide"></div>
      <button class="btn" style="font-size:17px;margin-top:10px;" onclick="startGame()">⚔ 踏上征程</button>
      <div style="color:#283818;font-size:10px;margin-top:8px;letter-spacing:3px;">WASD移动 · 空格大招 · E互动 · 自动攻击</div>
    </div>
    <!-- LEVEL UP -->
    <div class="scr hide" id="sLvl">
      <div style="font-size:30px;font-weight:bold;color:#d4a820;letter-spacing:4px;margin-bottom:4px;">⬆ 英雄成长 ⬆</div>
      <div style="font-size:11px;color:#8a6a28;letter-spacing:4px;margin-bottom:20px;" id="lvlLbl"></div>
      <div class="cards" id="cards"></div>
      <div id="lvlControls" style="display:flex; gap:15px; margin-top:25px;"></div>
    </div>
    <!-- EVO -->
    <div class="scr hide" id="sEvo" style="background:rgba(0,4,0,.97);">
      <div style="font-size:72px;margin-bottom:8px;filter:drop-shadow(0 0 28px gold);" id="eIco"></div>
      <div

      if (audioCtx.state === 'suspended') return; // 防止浏览器拦截
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);

      if (type === 'shoot') { // 🔫 射击 (短促的方波)
        osc.type = 'square';
        osc.frequency.setValueAtTime(150 + Math.random() * 50, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
      } else if (type === 'hit') { // 💥 怪物死亡 (低频锯齿波)
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.linearRampToValueAtTime(0.01, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
      } else if (type === 'exp') { // ✨ 吃经验/灵石 (清脆的正弦波)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800 + Math.random() * 200, t);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.linearRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
      } else if (type === 'lvl') { // ⬆️ 升级 (激昂的三角波上扬)
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.linearRampToValueAtTime(900, t + 0.4);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.linearRampToValueAtTime(0.01, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);

        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(10, t + 0.5);

      const twin = wave % 14 === 0 && wave >= 14;
      const boss = wave % 7 === 0;
      waveTotal = boss || twin ? 2 : 12 + wave * 3;
      waveSpawned = 0; spawnTimer = 0;
      spawnInterval = Math.max(.14, 1.8 - wave * .052);
    }

    // ═══ TERRAIN ═══════════════════════════════════════════════════════════════
    function genTerrain() {
      terrain = []; swamps = []; relics = []; altarsList = []; compEggs = [];
      // Barrels
      for (let i = 0; i < 70; i++) { const a = Math.random() * Math.PI * 2, d = 250 + Math.random() * 2800; terrain.push({ type: 'barrel', wx: Math.cos(a) * d, wy: Math.sin(a) * d, hp: 35, maxHp: 35, exploded: false }); }
      // Oil drums
      for (let i = 0; i < 30; i++) { const a = Math.random() * Math.PI * 2, d = 300 + Math.random() * 2500; terrain.push({ type: 'drum', wx: Math.cos(a) * d, wy: Math.sin(a) * d, hp: 50, maxHp: 50, exploded: false }); }
      // Swamps
      for (let i = 0; i < 22; i++) { const a = Math.random() * Math.PI * 2, d = 350 + Math.random() * 2500; swamps.push({ wx: Math.cos(a) * d, wy: Math.sin(a) * d, r: 70 + Math.random() * 80 }); }
      // Altars
      for (let i = 0; i < 4; i++) { const a = i * Math.PI * .5 + Math.random() * .4, d = 700 + Math.random() * 1500; altarsList.push({ wx: Math.cos(a) * d, wy: Math.sin(a) * d, r: 22, activated: false, pulse: 0 }); }
      // Companion eggs
      for (let i = 0; i < 5; i++) { const a = Math.random() * Math.PI * 2, d = 400 + Math.random() * 2000; compEggs.push({ wx: Math.cos(a) * d, wy: Math.sin(a) * d, r: 16, hatchT: 0, hatched: false, type: ['mouse', 'dragon', 'fairy'][Math.floor(Math.random() * 3)], pulse: 0 }); }
    }

    // ═══ COMPANIONS ════════════════════════════════════════════════════════════
    function updateMouse(c, dt) {
      // Look for nearest gem
      if (c.state === 'follow' || !c.target || !gems.find(g => g === c.target)) {
        let best = null, bd = Infinity;
        gems.forEach(g => { const d = dsq(c.wx, c.wy, g.wx, g.wy); if (d < bd && d < 400 * 400) { bd = d; best = g; } });
        c.target = best; c.state = best ? 'fetch' : 'follow';
      }
      if (c.state === 'fetch' && c.target) {
        const d = dsq(c.wx, c.wy, c.target.wx, c.target.wy);
        if (d < 18 * 18) { gainXP(c.target.xp); goldRun += (c.target.gold || 0); gems = gems.filter(g => g !== c.target); c.target = null; c.state = 'follow'; return; }
        const a = Math.atan2(c.target.wy - c.wy, c.target.wx - c.wx);
        c.wx += Math.cos(a) * c.speed * dt; c.wy += Math.sin(a) * c.speed * dt;
      } else {
        const a = Math.atan2(player.wy - c.wy, player.wx - c.wx);
        const d = Math.hypot(player.wx - c.wx, player.wy - c.wy);
        if (d > 90) { c.wx += Math.cos(a) * c.speed * dt; c.wy += Math.sin(a) * c.speed * dt; }
        else if (d < 50) { c.wx -= Math.cos(a) * 30 * dt; c.wy -= Math.sin(a) * 30 * dt; }
      }
    }
    function updateDragon(c, dt) {
      // Follow player
      const a = Math.atan2(player.wy - c.wy, player.wx - c.wx);
      const d = Math.hypot(player.wx - c.wx, player.wy - c.wy);
      if (d > 100) c.wx += Math.cos(a) * c.speed * dt, c.wy += Math.sin(a) * c.speed * dt;
      else if (d < 60) c.wx -= Math.cos(a) * 40 * dt, c.wy -= Math.sin(a) * 40 * dt;
      // Attack
      c.fireCd -= dt;
      if (c.fireCd <= 0 && enemies.length > 0) {
        let nn = null, nd = Infinity;
        // 🎯 核心修复：加入 inView 判断，英雄只会瞄准“已经在屏幕内”的怪物！
        enemies.forEach(e => {
          const d = dsq(e.wx, e.wy, player.wx, player.wy);
          if (d < nd && inView(e.wx, e.wy, e.r)) { nd = d; nn = e; }
        });
        if (nn && nd < 400 * 400) {
          const ba = Math.atan2(nn.wy - c.wy, nn.wx - c.wx);
          const shots = c.lvl >= 2 ? 3 : 1;
          for (let i = 0; i < shots; i++) {
            const oa = (i - (shots - 1) / 2) * .25;
            bullets.push({
              wx: c.wx, wy: c.wy, vx: Math.cos(ba + oa) * 360, vy: Math.sin(ba + oa) * 360,
              damage: player.damage * .6 * (c.lvl >= 2 ? 1.5 : 1), r: 7, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'companion', homing: 0, chainLeft: 0, col: '#ff8030'
            });
          }
          burst(c.wx, c.wy, '#ff6020', 4, 80);
          c.fireCd = c.lvl >= 2 ? 0.6 : 1.2;
        } else c.fireCd = .5;
      }
      // Evolution at 50 kills
      if (!c.evolved && (c.kills || 0) >= 50) { c.evolved = true; c.lvl = 2; burst(c.wx, c.wy, '#ff4000', 20, 200); ring(c.wx, c.wy, 60, '#ff8030', 4); }
    }
    function updateFairy(c, dt) {
      c.orbAngle += dt * 2.8;
      const ox = player.wx + Math.cos(c.orbAngle) * 65, oy = player.wy + Math.sin(c.orbAngle) * 65;
      c.wx += (ox - c.wx) * dt * 6; c.wy += (oy - c.wy) * dt * 6;
      c.healTimer -= dt;
      if (c.healTimer <= 0) {
        c.healTimer = c.healCd;
        if (Math.random() < .6 && !player.noHeal) {
          player.hp = Math.min(player.maxHp, player.hp + 18);
          burst(player.wx, player.wy, '#a0ffb0', 10, 80); dmgNum(player.wx, player.wy - 30, 18, false, '#40ff80');
        } else {
          if (!player.shieldCd) { player.shieldCd = 6; player.shieldTimer = 0; }
          player.shieldReady = true;
          burst(player.wx, player.wy, '#60c0ff', 10, 90); ring(player.wx, player.wy, 60, '#60c0ff', 3);
        }
      }
    }

    // ═══ EVENTS ════════════════════════════════════════════════════════════════

    // ═══ KILL / COMBAT ═════════════════════════════════════════════════════════
    function killEnemy(e) {
      if (e.boss || e.twin) {
        chests.push({ wx: e.wx, wy: e.wy, r: 24, pulse: 0 }); // 掉落宝箱
        const rts = ['fire', 'ice', 'lightning'];
        runesDrop.push({ wx: e.wx + 30, wy: e.wy + 30, type: rts[Math.floor(Math.random() * rts.length)], r: 16, pulse: 0 });
      }
      killCount++;
      playSnd(e.boss || e.shape === 'tree' ? 'boom' : 'hit', e.boss ? 0.2 : 0.04);
      // --- 连击系统判定 ---
      comboTimer = 3.5; // 3.5秒内不杀怪就会断连
      if (comboCount >= 100 && !frenzyMode) {
        frenzyMode = true;
        addEventMsg('🔥 狂暴状态激活！移速提升，掉落翻倍！');
        burst(player.wx, player.wy, '#ff2020', 40, 300);
        shake(10, 0.5);
      }

      // // 🩸 战场血迹斑布 (果汁感核心)
      // const splatCount = e.boss ? 12 : (e.type === 'orc' ? 4 : 1);
      // for (let i = 0; i < splatCount; i++) {
      //   decals.push({
      //     wx: e.wx + (Math.random() - .5) * e.r * 2.5,
      //     wy: e.wy + (Math.random() - .5) * e.r * 2.5,
      //     r: e.r * (0.4 + Math.random() * 0.8),
      //     color: e.color,
      //     a: Math.random() * Math.PI * 2
      //   });
      // }
      // if (decals.length > MAX_DECALS) decals.splice(0, decals.length - MAX_DECALS);

      // 推进击杀悬赏进度
      if (bounty && bounty.state === 'active' && bounty.type === 'kill') bounty.current++;
      const bk = meta.bestiary; bk[e.type] = (bk[e.type] || 0) + 1;
      const xmul = (curZone && ZONE_TYPES[curZone.type].xpMult) || 1;
      const dmul = (curZone && ZONE_TYPES[curZone.type]?.onKill?.() || 1);
      const ng = e.boss ? 12 : 1;
      for (let i = 0; i < ng; i++) { const a = Math.random() * Math.PI * 2, d = i ? Math.random() * 30 : 0; gems.push({ wx: e.wx + Math.cos(a) * d, wy: e.wy + Math.sin(a) * d, xp: e.xp / ng * xmul, gold: i === 0 ? e.gold * dmul * (frenzyMode ? 2 : 1) : 0, r: 6, pulse: Math.random() * Math.PI * 2 }); }

      burst(e.wx, e.wy, e.color, e.boss ? 40 : 14);
      ring(e.wx, e.wy, e.boss ? 140 : 70, e.color, e.boss ? 4 : 2);
      if (e.boss) { shake(16, .55); hitStop(80); }
      if (player.lifesteal > 0 && !player.noHeal) player.hp = Math.min(player.maxHp, player.hp + player.lifesteal);
      if (player.stackDmg) { player.stackKills++; player.damage *= (1 + Math.min(player.stackKills, 100) * .01) / Math.max(1, 1 + (player.stackKills - 1) * .01); }
      if (player.dbomb > 0) {
        const bx = e.wx, by = e.wy;
        setTimeout(() => {
          if (gameState !== 'game') return;
          const br = 72 + player.dbomb * 22;
          ring(bx, by, br, '#ff6020', 3); burst(bx, by, '#ff8030', 18, 185);
          enemies.forEach(e2 => { if (dsq(e2.wx, e2.wy, bx, by) < br * br) { e2.hp -= player.damage * 1.6; e2.flash = .12; } });
          // 🎯 修复：让被尸爆炸死的怪物正常触发掉落和连击判定！
          enemies = enemies.filter(e2 => { 
              if (e2.hp <= 0) { killEnemy(e2); return false; } 
              return true; 
          });
        }, 750);
      }
      // Dragon companion kill tracking
      companions.forEach(c => { if (c.type === 'dragon') c.kills = (c.kills || 0) + 1; });
      if (e.special) { goldRun += 100; burst(e.wx, e.wy, '#ffd700', 30, 250); ring(e.wx, e.wy, 100, '#ffd700', 5); addEventMsg(`✨ 击杀黄金史莱姆！+100灵石！`); goldenSlime = null; }

      // 👑 真结局通关判定！
      if (e.shape === 'tree') {
        gameState = 'ascension';
        meta.gold += 10000;
        meta.endlessMode = true; // 永久解锁无尽模式
        save();

        // 纯白飞升结算画面
        const asc = document.createElement('div');
        asc.style.cssText = 'position:absolute;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:ascFade 4s ease-in forwards; opacity:0;';
        asc.innerHTML = `
             <style>@keyframes ascFade{from{opacity:0;}to{opacity:1;}}</style>
             <div style="font-size:80px;font-weight:900;color:#d4a820;letter-spacing:30px;margin-bottom:20px;text-shadow:0 0 40px rgba(212,168,32,0.6);">飞 升 成 功</div>
             <div style="font-size:18px;color:#555;letter-spacing:10px;margin-bottom:50px;font-weight:bold;">你已击碎深渊，草原迎来了永久的和平</div>
             <div style="font-size:24px;color:#d4a820;margin-bottom:30px;font-weight:bold;">🎁 获得 10,000 灵石奖励 🎁</div>
             <div style="font-size:16px;color:#40a0ff;margin-bottom:50px;font-weight:bold;">✨ 大本营已永久解锁【无尽模式】 ✨</div>
             <button class="btn" style="padding:15px 50px;font-size:20px;background:linear-gradient(180deg, #d4a820, #a07010);color:#fff;border:none;box-shadow:0 10px 20px rgba(0,0,0,0.3);" onclick="location.reload()">返 回 大 本 营</button>
          `;
        document.getElementById('wrap').appendChild(asc);
        return;
      }

      // --- 词缀3：死后分裂 ---
      if (e.affixes && e.affixes.includes('split')) {
        for (let i = 0; i < 3; i++) {
          const a = Math.random() * Math.PI * 2;
          const mini = mkEnemy('slime', e.wx + Math.cos(a) * 40, e.wy + Math.sin(a) * 40);
          // 继承部分属性，变得更小、更快、更致命
          mini.hp = e.maxHp * 0.15; mini.maxHp = mini.hp;
          mini.speed = e.speed * 1.6; mini.r = e.r * 0.6; mini.damage = e.dmg * 0.6;
          mini.color = '#a0ff20'; mini.xp = e.xp * 0.2; mini.boss = false; // 取消 Boss 判定
          enemies.push(mini);
        }
        addEventMsg('🦠 精英发生了变异分裂！');
      }
    }

    function doChain(sx, sy, dmg, left, hitIds) {
      if (left <= 0) return;
      let best = null, bd = Infinity;
      enemies.forEach(e => { if (hitIds.includes(e.id)) return; const d = dsq(e.wx, e.wy, sx, sy); const rng2 = player.chainRange || 230; if (d < rng2 * rng2 && d < bd) { bd = d; best = e; } });
      if (!best) return;
      const cd = player.evoThunder ? dmg : dmg * .65;
      damageLog['特效连锁'] += cd;
      bolt(sx, sy, best.wx, best.wy);
      best.hp -= cd; applyElement(best, 'lightning', cd); best.flash = .1; hitSpark(best.wx, best.wy, false); dmgNum(best.wx, best.wy - best.r - 10, cd, false, '#a0d0ff');
      if (best.hp <= 0) { killEnemy(best); enemies = enemies.filter(e => e.hp > 0); }
      doChain(best.wx, best.wy, cd, left - 1, [...hitIds, best.id]);
    }

    function applyElement(e, elem, baseDmg) {
      if (e.hp <= 0) return;
      // ⛈️ 天气元素共鸣修正
      if (weather === 'rain' && elem === 'lightning') baseDmg *= 1.5;
      if (weather === 'heat' && elem === 'fire') baseDmg *= 1.5;
      if (weather === 'snow' && elem === 'fire') baseDmg *= 0.5;

      // 暴风雪的“碎冰处决”机制 (血量低于 20% 直接秒杀非 Boss 怪物)
      if (weather === 'snow' && elem === 'ice' && !e.boss && !e.twin && e.hp < e.maxHp * 0.2) {
        baseDmg = e.hp;
        burst(e.wx, e.wy, '#a0ffff', 25, 200);
      }
      if (elem === 'ice') {
        if (e.shockT > 0) { // 雷 + 冰 = 超导
          e.shockT = 0; ring(e.wx, e.wy, 70, '#a0ffff', 3); burst(e.wx, e.wy, '#ffffff', 16, 180);
          const dmg = baseDmg * 1.5; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#a0ffff');
          damageLog['元素反应: 超导'] += dmg; hitStop(20);
        } else if (e.burnT > 0) { // 火 + 冰 = 融化
          e.burnT = 0; ring(e.wx, e.wy, 90, '#ffc080', 4); burst(e.wx, e.wy, '#ffe0c0', 15, 120);
          const dmg = baseDmg * 2.0; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#ff8040');
          damageLog['元素反应: 融化'] += dmg;
          effects.push({ type: 'steam', wx: e.wx, wy: e.wy, r: 85, life: 1, dur: 3.5 }); // 产生蒸汽场
        } else {
          e.frozen = .7 + (player.freeze || 0) * .4; if (e.frozenSpd == null) e.frozenSpd = e.speed; e.speed = Math.max(e.speed * .35, 25);
        }
      } else if (elem === 'lightning') {
        if (e.frozen > 0) { // 雷 + 冰 = 超导
          e.frozen = 0; e.speed = e.frozenSpd || e.speed; ring(e.wx, e.wy, 70, '#a0ffff', 3); burst(e.wx, e.wy, '#ffffff', 16, 180);
          const dmg = baseDmg * 1.5; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#a0ffff'); damageLog['元素反应: 超导'] += dmg;
        } else if (e.burnT > 0) { // 雷 + 火 = 超载
          e.burnT = 0; ring(e.wx, e.wy, 120, '#ff4020', 5); burst(e.wx, e.wy, '#ff2010', 25, 250);
          const dmg = baseDmg * 2.5; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#ff4020');
          e.kbx += (e.wx - player.wx) * 0.4; e.kby += (e.wy - player.wy) * 0.4; // 强烈击退
          damageLog['元素反应: 超载'] += dmg; shake(8, .2); hitStop(40);
        } else {
          e.shockT = 3.0; // 感电3秒
        }
      } else if (elem === 'fire') {
        if (e.frozen > 0) { // 火 + 冰 = 融化
          e.frozen = 0; e.speed = e.frozenSpd || e.speed; ring(e.wx, e.wy, 90, '#ffc080', 4);
          const dmg = baseDmg * 2.0; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#ff8040'); damageLog['元素反应: 融化'] += dmg;
          effects.push({ type: 'steam', wx: e.wx, wy: e.wy, r: 85, life: 1, dur: 3.5 });
        } else if (e.shockT > 0) { // 火 + 雷 = 超载
          e.shockT = 0; ring(e.wx, e.wy, 120, '#ff4020', 5); burst(e.wx, e.wy, '#ff2010', 25, 250);
          const dmg = baseDmg * 2.5; e.hp -= dmg; dmgNum(e.wx, e.wy, dmg, true, '#ff4020');
          damageLog['元素反应: 超载'] += dmg; shake(8, .2); hitStop(40);
        } else {
          e.burnT = 3.0; // 燃烧3秒
        }
      }
      if (e.hp <= 0) killEnemy(e);
    }

    function fireAt(sx, sy, tx, ty, dmg, bsize, bspd, pierce, chain, homing, owner = 'player', col = null) {
      if (bullets.length >= MAX_BULLETS) return;
      if (owner === 'player') playSnd('shoot', 0.02); // 射击音效 (音量调小一点防吵)
      if (owner === 'player' && frenzyMode) { col = '#ff2050'; bspd *= 1.3; } // 狂暴时射出超高速猩红弹幕
      const a = Math.atan2(ty - sy, tx - sx);
      let shots = player.multiShot, spread = shots > 1 ? .20 : 0;
      if (player.evoBarrage && owner === 'player') { shots = 8; spread = Math.PI * 2; }
      for (let i = 0; i < shots && bullets.length < MAX_BULLETS; i++) {
        const off = shots > 1 ? (i / (shots - 1) - .5) * spread * 2 : 0;
        const ang = player.evoBarrage && owner === 'player' ? i * (Math.PI * 2 / shots) : a + off;
        bullets.push({
          wx: sx, wy: sy, vx: Math.cos(ang) * bspd, vy: Math.sin(ang) * bspd,
          damage: dmg, r: bsize, pierce: pierce, pierceLeft: pierce, hits: [], trail: [],
          owner, homing, chainLeft: chain, born: gameTime, col
        });
      }
    }

    function gainXP(xp) {
      player.xp += xp * (player.xpMult || 1);
      while (player.xp >= player.xpNext) {
        player.xp -= player.xpNext; player.level++; player.xpNext = Math.floor(player.xpNext * 1.28);
        if (player.nova > 0) {
          const nr = 125 + player.nova * 38;
          ring(player.wx, player.wy, nr, '#d4a820', 5); burst(player.wx, player.wy, '#ffe060', 28, 230);
          enemies.forEach(e => { if (dsq(e.wx, e.wy, player.wx, player.wy) < nr * nr) { e.hp -= player.damage * 3; e.flash = .15; } });
          enemies = enemies.filter(e => { if (e.hp <= 0) { killEnemy(e); return false; } return true; });
          shake(6, .2);
        }
        doLevelUp(); return;
      }
    }

    // ═══ LEVEL UP & 命运掌控系统 (精准局部修复版) ═══
    function doLevelUp() {
      gameState = 'lvl';
      playSnd('lvl', 0.15); // 升级提示音
      document.getElementById('lvlLbl').textContent = `第 ${player.level} 级 — 选择强化技能`;

      const avail = UPGRADES.filter(u => (upgradeTrack[u.id] || 0) < u.max && !player.banished.includes(u.id));

      if (avail.length === 0) {
        player.hp = Math.min(player.maxHp, player.hp + player.maxHp * .3);
        showScr(null); gameState = 'game'; lastTs = null; requestAnimationFrame(loop); return;
      }

      for (let i = avail.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[avail[i], avail[j]] = [avail[j], avail[i]]; }
      upgradeChoices = avail.slice(0, Math.min(player.luck || 3, avail.length));

      redrawCards(); // 调用独立的 UI 渲染函数
      showScr('sLvl');
    }

    // 将渲染逻辑单独抽离，方便后续“局部替换”
    function redrawCards() {
      const el = document.getElementById('cards'); el.innerHTML = '';
      upgradeChoices.forEach((u, i) => {
        const lv = (upgradeTrack[u.id] || 0) + 1;
        const evo = EVOS.some(e => Object.entries(e.req).some(([id]) => id === u.id) && !activeEvos.has(e.id));
        const d = document.createElement('div'); d.className = 'card' + (evo ? ' evo' : '');
        const tagsHtml = (u.tags || []).map(t => {
          const c = { fire: '#ff4040', ice: '#40c0ff', lightning: '#e0d020', phys: '#a0a0a0', wind: '#40ff80', light: '#ffd060', dark: '#b040ff', nature: '#40ff40' }[t] || '#fff';
          return `<span style="background:rgba(0,0,0,0.5);color:${c};border:1px solid ${c};border-radius:3px;padding:1px 4px;font-size:8px;margin-right:2px;">${t.toUpperCase()}</span>`;
        }).join('');

        d.innerHTML = `<div style="font-size:26px;margin-bottom:6px;">${u.icon}</div>
      <div style="font-size:11px;font-weight:bold;color:#d4a820;margin-bottom:3px;">${u.name}</div>
      <div style="margin-bottom:4px;">${tagsHtml}</div>
      <div style="font-size:9px;color:#6a8a4a;line-height:1.5;">${u.desc}</div>
      <div style="font-size:9px;color:#8a6a28;margin-top:5px;">Lv ${lv}/${u.max}${evo ? ' ⚡' : ''}</div>`;

        if (player.banishes > 0) {
          d.innerHTML += `<div style="margin-top:10px;"><button class="btn btnr btnsm" onclick="event.stopPropagation(); banishUpgrade(${i})">放逐 (${player.banishes})</button></div>`;
        }

        d.onclick = () => pickUpgrade(i); el.appendChild(d);
      });

      const ctrl = document.getElementById('lvlControls');
      if (ctrl) {
        ctrl.innerHTML = `
          <button class="btn btng" ${player.rerolls <= 0 ? 'style="opacity:0.5;cursor:not-allowed"' : ''} onclick="rerollUpgrades()">🎲 刷新 (${Math.max(0, player.rerolls)})</button>
          <button class="btn" ${player.skips <= 0 ? 'style="opacity:0.5;cursor:not-allowed"' : ''} onclick="skipUpgrade()">⏭ 跳过 (${Math.max(0, player.skips)})</button>
        `;
      }
    }

    function rerollUpgrades() {
      if (player.rerolls <= 0) return;
      player.rerolls--;
      doLevelUp(); // 刷新是真正的“全盘重洗”
    }

    function skipUpgrade() {
      if (player.skips <= 0) return;
      player.skips--;
      player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.2);
      addEventMsg('⏭ 跳过升级，恢复 20% 生命！');
      showScr(null); gameState = 'game'; lastTs = null; requestAnimationFrame(loop);
    }

    function banishUpgrade(i) {
      if (player.banishes <= 0) return;
      player.banishes--;
      const u = upgradeChoices[i];
      player.banished.push(u.id);
      addEventMsg(`🚫 已放逐 [${u.name}]，本局不再出现！`);

      // 核心修复：只找一个“不在当前面板上”的新技能来填补空位
      const currentIds = upgradeChoices.map(c => c.id);
      const avail = UPGRADES.filter(up =>
        (upgradeTrack[up.id] || 0) < up.max &&
        !player.banished.includes(up.id) &&
        !currentIds.includes(up.id)
      );

      if (avail.length > 0) {
        const newU = avail[Math.floor(Math.random() * avail.length)];
        upgradeChoices[i] = newU; // 仅替换这一个位置
      } else {
        upgradeChoices.splice(i, 1); // 实在没别的牌了，就把这个位置删掉
      }

      redrawCards(); // 重新渲染界面，另外两张牌纹丝不动
    }
    function openChest() {
      gameState = 'chest';
      // 过滤出还可以升级的技能
      const avail = UPGRADES.filter(u => (upgradeTrack[u.id] || 0) < u.max);

      // 核心爆率机制：10%概率三连抽，25%概率两连抽，65%概率单抽
      const rnd = Math.random();
      let count = rnd < 0.1 ? 3 : rnd < 0.35 ? 2 : 1;
      if (count > avail.length) count = avail.length;

      if (count === 0) {
        // 如果技能全满了，宝箱直接给海量金币和回血
        goldRun += 250; player.hp = player.maxHp;
        addEventMsg('🎁 技能已满！宝箱化为 250 灵石与完全恢复！');
        gameState = 'game'; lastTs = null; requestAnimationFrame(loop);
        return;
      }

      // 打乱数组并抽取
      for (let i = avail.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[avail[i], avail[j]] = [avail[j], avail[i]]; }
      const picks = avail.slice(0, count);

      const el = document.getElementById('cCards'); el.innerHTML = '';
      document.getElementById('cBtn').style.display = 'none';
      document.getElementById('cIco').textContent = count === 3 ? '🎉🎁🎉' : '🎁';

      showScr('sChest');

      // 制造“一件件弹出来”的爽快节奏感
      picks.forEach((u, idx) => {
        setTimeout(() => {
          u.apply(player);
          upgradeTrack[u.id] = (upgradeTrack[u.id] || 0) + 1;

          const lv = upgradeTrack[u.id];
          const d = document.createElement('div');
          d.className = 'card evo'; // 复用发光卡片样式
          d.style.transform = 'scale(0)';
          d.innerHTML = `<div style="font-size:42px;margin-bottom:10px;">${u.icon}</div>
                         <div style="font-size:16px;font-weight:bold;color:#ffd060;margin-bottom:6px;">${u.name}</div>
                         <div style="font-size:12px;color:#a0c060;">已提升至 Lv.${lv}</div>`;
          el.appendChild(d);

          // 加上一点弹出动画效果
          setTimeout(() => { d.style.transform = 'scale(1)'; d.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; }, 50);

          // 每次弹出都震动一下，爆出粒子
          burst(player.wx, player.wy, '#ffd700', 30, 250);
        }, 600 * (idx + 1)); // 每隔 0.6 秒弹出一个
      });

      // 所有奖励展示完毕后，显示关闭按钮
      setTimeout(() => {
        document.getElementById('cBtn').style.display = 'inline-block';
      }, 600 * count + 600);
    }

    function closeChest() {
      showScr(null);
      gameState = 'game';
      lastTs = null;
      // 收下奖励后，统一检查是否凑齐了超武进化配方
      checkEvos();
      requestAnimationFrame(loop);
    }

    function pickUpgrade(i) {
      if (gameState !== 'lvl') return; // 🎯 修复：防止手速快导致重复狂点，突破等级上限
      const u = upgradeChoices[i]; u.apply(player);
      upgradeTrack[u.id] = (upgradeTrack[u.id] || 0) + 1;
      checkEvos();
      if (gameState === 'lvl') { showScr(null); gameState = 'game'; lastTs = null; requestAnimationFrame(loop); }
    }

    function checkEvos() {
      updateSynergies();
      EVOS.forEach(ev => {
        if (activeEvos.has(ev.id)) return;
        // 检查配方是否满足 (所有前置技能都达到了要求等级)
        if (Object.entries(ev.req).every(([id, lv]) => (upgradeTrack[id] || 0) >= lv)) {
          activeEvos.add(ev.id);

          // ━━━ 核心新增：记录到永久超武图鉴 ━━━
          if (!meta.discoveredEvos) meta.discoveredEvos = [];
          if (!meta.discoveredEvos.includes(ev.id)) {
            meta.discoveredEvos.push(ev.id);
            save(); // 写入本地存档
          }

          ev.apply(player); showEvo(ev);
        }
      });
    }
    function showEvo(ev) {
      gameState = 'evo';
      document.getElementById('eIco').textContent = ev.icon;
      document.getElementById('eNm').textContent = ev.name;
      document.getElementById('eDsc').textContent = ev.desc;
      showScr('sEvo');
      setTimeout(() => { showScr(null); gameState = 'game'; lastTs = null; requestAnimationFrame(loop); }, 3200);
    }

    // ═══ ACTIVE SKILL ══════════════════════════════════════════════════════════
    function trySkill() {
      if (gameState !== 'game' || player.skillTimer > 0) return;
      const ch = CHARS.find(c => c.id === meta.selChar);
      player.skillTimer = player.skillCd * (curZone && ZONE_TYPES[curZone.type]?.cdrMult || 1);
      if (ch.id === 'warrior') {
        player.invincible = 1.5;
        const a = player.angle; burst(player.wx, player.wy, '#ff8030', 22, 200);
        for (let i = 0; i < 8; i++) {
          const t = i / 8;
          effects.push({ type: 'flame', wx: player.wx + Math.cos(a) * 260 * t, wy: player.wy + Math.sin(a) * 260 * t, r: 30, life: 1, dur: 2, dmg: player.damage * 1.8 });
        }
        player.wx += Math.cos(a) * 250; player.wy += Math.sin(a) * 250;
        ring(player.wx, player.wy, 90, '#ff8030', 4); shake(7, .25);
      } else if (ch.id === 'priest') {
        if (!player.noHeal) player.hp = Math.min(player.maxHp, player.hp + 120);
        ring(player.wx, player.wy, 170, '#40ff90', 5); burst(player.wx, player.wy, '#60ffb0', 28, 180);
        effects.push({ type: 'healZone', wx: player.wx, wy: player.wy, r: 140, life: 1, dur: 4.5 });
        dmgNum(player.wx, player.wy - 30, 120, false, '#40ff90');
      } else if (ch.id === 'hunter') {
        const orig = player.fireRate; player.fireRate *= 3.5; player.multiShot += 2;
        burst(player.wx, player.wy, '#ffe060', 20, 200); ring(player.wx, player.wy, 80, '#ffd040', 3);
        setTimeout(() => { if (player) { player.fireRate = orig; player.multiShot -= 2; } }, 3000);
      }
    }

    // ═══ HIT PLAYER ════════════════════════════════════════════════════════════
    function hitPlayer(dmg) {
      if (player.invincible > 0) return;
      // 🤖 优先扣除机甲装甲
      if (player.inMecha) {
        player.mechaHp -= dmg * 0.4; // 机甲带 60% 物理免伤
        shake(4, 0.1); burst(player.wx, player.wy, '#80a0c0', 5, 100);
        if (player.mechaHp <= 0) {
          player.inMecha = false; player.invincible = 2.0; // 爆机给2秒无敌
          burst(player.wx, player.wy, '#ff4020', 50, 400); ring(player.wx, player.wy, 280, '#ff4020', 8);
          enemies.forEach(e => { if (dsq(e.wx, e.wy, player.wx, player.wy) < 280 * 280) e.hp -= 2000; }); // 核爆伤害
          addEventMsg('💥 机甲核心过载！已紧急弹射逃生！'); shake(20, 0.6); hitStop(100);
        }
        return;
      }
      if (player.mirror && Math.random() < .5) { burst(player.wx, player.wy, '#8080ff', 5, 80); return; }
      if (player.shieldReady) {
        player.shieldReady = false; player.shieldTimer = 0;
        burst(player.wx, player.wy, '#60c0ff', 18, 180); ring(player.wx, player.wy, 90, '#60c0ff', 4); shake(5, .2); hitStop(40); return;
      }
      // 🛠️ 修复：把错误递归的 hitPlayer(dmg) 改成真正的扣血逻辑 player.hp -= dmg
      player.hp -= dmg; player.invincible = .1; shake(3, .12); burst(player.wx, player.wy, '#ff4040', 8, 115); hitStop(20);
      if (player.hp <= 0) {
        if (player.revive && !player.revived) { player.revived = true; player.hp = Math.floor(player.maxHp * .3); ring(player.wx, player.wy, 120, '#ffe060', 6); burst(player.wx, player.wy, '#ffd060', 28, 220); addEventMsg('⌛ 沙漏之力！死里逃生！'); }
        else gameOver();
      }
    }

    // ═══ BOSS PHASES ═══════════════════════════════════════════════════════════
    function updateBossPhase(e, dt) {
      const hp = e.hp / e.maxHp;
      if (e.phase === 1 && hp < .6) { e.phase = 2; ring(e.wx, e.wy, 150, '#ff4040', 6); burst(e.wx, e.wy, '#ff2020', 30, 250); addEventMsg('⚠ Boss进入狂暴形态！'); shake(12, .4); }
      if (e.phase === 2 && hp < .3) { e.phase = 3; ring(e.wx, e.wy, 180, '#ff00ff', 6); burst(e.wx, e.wy, '#ff00ff', 35, 280); addEventMsg('💀 Boss进入弹幕地狱！'); }

      // 🌳 世界树专属终极技能轴
      if (e.shape === 'tree') {
        e.phaseTimer += dt;
        if (e.phase === 1 && e.phaseTimer > 1.5) {
          e.phaseTimer = 0; spawnEdge(Math.random() > 0.5 ? 'orc' : 'summoner'); // 不断召唤兽人和召唤师
        }
        else if (e.phase === 2 && e.phaseTimer > 0.8) {
          e.phaseTimer = 0;
          for (let i = 0; i < 16; i++) {
            const a = i * Math.PI / 8 + gameTime;
            if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(a) * 220, vy: Math.sin(a) * 220, damage: e.dmg, r: 12, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, col: '#80ff20' });
          }
          shake(5, 0.2);
        }
        else if (e.phase === 3 && e.phaseTimer > 0.25) {
          e.phaseTimer = 0;
          const ba = Math.atan2(player.wy - e.wy, player.wx - e.wx);
          if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(ba) * 450, vy: Math.sin(ba) * 450, damage: e.dmg * 2, r: 16, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0.6, chainLeft: 0, col: '#ff0050' });
          burst(e.wx, e.wy, '#ff0050', 5, 100);
        }
        return; // 树是不可撼动的，跳过后续所有位移代码
      }

      if (e.phase === 3) {
        // Bullet hell patterns
        e.bulletHellAngle += dt * 2.5;
        e.phaseTimer += dt;
        const patt = Math.floor(e.phaseTimer / 4) % 3;
        if (patt === 0) {// Spiral
          const ba = e.bulletHellAngle;
          for (let i = 0; i < 5; i++) { const a = ba + i * Math.PI * 2 / 5; if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(a) * 210, vy: Math.sin(a) * 210, damage: e.dmg * .45, r: 8, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime }); }
        } else if (patt === 1) {// Circle burst every 0.6s
          e._circleT = (e._circleT || 0) + dt;
          if (e._circleT > 0.6) { e._circleT = 0; for (let i = 0; i < 12; i++) { const a = i * Math.PI * 2 / 12; if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(a) * 240, vy: Math.sin(a) * 240, damage: e.dmg * .55, r: 9, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime }); } }
        } else {// Aimed cross
          e._crossT = (e._crossT || 0) + dt;
          if (e._crossT > 0.8) { e._crossT = 0; const ba = Math.atan2(player.wy - e.wy, player.wx - e.wx); for (let i = 0; i < 4; i++) { const a = ba + i * Math.PI / 2; if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(a) * 260, vy: Math.sin(a) * 260, damage: e.dmg * .65, r: 10, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime }); } }
        }
      }
      if (e.phase >= 2 && Math.random() < .015) spawnEdge(pickType()); // Summon adds in phase 2+
    }

    function updateTwinBoss(e, dt) {
      // Find linked twin
      const twin = enemies.find(t => t.twin && t.id === e.linkedId);
      if (twin && twin.hp <= 0 && !e.isDead) {
        // Try to revive
        e.reviveTimer += dt;
        if (e.reviveTimer < 10) {
          ring(e.wx, e.wy, 60, '#e05090', 2);
          if (Math.floor(e.reviveTimer * 2) !== Math.floor((e.reviveTimer - dt) * 2)) addEventMsg(`💀 双子Boss复活读条：${Math.ceil(10 - e.reviveTimer)}s`);
        } else {
          twin.hp = twin.maxHp * .4; twin.isDead = false; e.reviveTimer = 0;
          ring(twin.wx, twin.wy, 120, '#ff80c0', 6); burst(twin.wx, twin.wy, '#ff80c0', 30, 220); addEventMsg('💀 双子Boss已复活！需在10秒内同时击杀！');
        }
      }
    }

    // ═══ START / OVER ══════════════════════════════════════════════════════════
    function startGame() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      player = mkPlayer(meta.selChar);
      bullets = []; enemies = []; gems = []; effects = []; companions = [];
      runesDrop = []; player.runes = { base: null, whirl: null, orbit: null };
      decals = [];
      merchant = null; shopPromptT = 0;
      comboCount = 0; comboTimer = 0; frenzyMode = false;
      chests = []; weather = 'clear'; weatherTimer = 45; weatherParticles = [];
      bounty = null; nextBountyT = 20; oldHp = 100;
      wave = 1; killCount = 0; gameTime = 0; cycleTimer = 0; lastTs = null; goldRun = 0; eid = 0;
      damageLog = { '基础射击': 0, '旋风护体': 0, '环绕光球': 0, '特效连锁': 0, '元素反应: 超导': 0, '元素反应: 融化': 0, '元素反应: 超载': 0 };
      upgradeTrack = {}; activeEvos = new Set(); upgradeChoices = []; pendingAltar = null;
      crystal = null; goldenSlime = null; crystalDefenseActive = false; curZone = null;
      cam.x = -W / 2; cam.y = -H / 2;
      chunkCache.clear(); genZones(); genTerrain();
      startWave(); showScr(null); gameState = 'game';
      // Random events timer
      let nextEvt = 30 + Math.random() * 30;
      let evtIdx = 0;
      function scheduleEvent() {
        if (gameState !== 'game') return; setTimeout(() => {
          if (gameState !== 'game') { scheduleEvent(); return; }
          evtIdx++; if (evtIdx % 2 === 0) spawnGoldenSlime(); else spawnCrystalDefense();
          scheduleEvent();
        }, nextEvt * 1000); nextEvt = 40 + Math.random() * 50;
      }
      scheduleEvent();
      requestAnimationFrame(loop);
    }

    function gameOver() {
      gameState = 'dead';
      meta.gold += Math.floor(goldRun * (player.goldMult || 1)); save();
      document.getElementById('dGold').textContent = `本局 +${Math.floor(goldRun * (player.goldMult || 1))} 灵石  总计 ${meta.gold}`;
      document.getElementById('dW').textContent = wave; document.getElementById('dK').textContent = killCount;
      document.getElementById('dL').textContent = player.level;
      const m = Math.floor(gameTime / 60), s = Math.floor(gameTime % 60); document.getElementById('dT').textContent = `${m}:${String(s).padStart(2, '0')}`;
      showScr('sDead');
    }
    function showMeta() { showScr('sMeta'); gameState = 'meta'; buildMetaUI(); }

    // ═══ MAIN LOOP ══════════════════════════════════════════════════════════════
    function loop(ts) {
      if (gameState !== 'game' && gameState !== 'pause') return;
      const rawDt = lastTs ? Math.min((ts - lastTs) / 1000, .055) : .016; lastTs = ts;

      if (gameState === 'pause') {
        draw();          // 绘制底层游戏画面
        drawPauseMenu(); // 绘制顶层暂停 UI
        requestAnimationFrame(loop);
        return;
      }

      hitStopT = Math.max(0, hitStopT - rawDt);
      gdt = hitStopT > 0 ? 0 : rawDt;
      update(gdt, rawDt);
      draw();
      requestAnimationFrame(loop);
    }

    // ═══ UPDATE ════════════════════════════════════════════════════════════════
    function update(dt, rdt) {
      gameTime += dt;

      // 🌌 羁绊：雷霆万钧 (每3秒天雷劈怪)
      if (player.syn_lightning) {
        player.synLightT = (player.synLightT || 0) - dt;
        if (player.synLightT <= 0 && enemies.length > 0) {
          player.synLightT = 3.0;
          for (let i = 0; i < 3; i++) {
            const target = enemies[Math.floor(Math.random() * enemies.length)];
            if (!target) continue;
            bolt(target.wx, target.wy - 500, target.wx, target.wy, '#ffd000');
            target.hp -= player.damage * 3; burst(target.wx, target.wy, '#ffff00', 15, 200); shake(5, 0.2);
            if (target.hp <= 0) killEnemy(target);
          }
        }
      }

      // --- 连击冷却计时 ---
      if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) {
          if (frenzyMode) addEventMsg('❄️ 狂暴状态结束...');
          comboCount = 0; frenzyMode = false;
        }
      }
      cycleTimer += dt;
      // ━━━ 天气系统控制器 ━━━
      weatherTimer -= dt;
      if (weatherTimer <= 0) {
        const types = ['clear', 'rain', 'heat', 'snow'];
        weather = types[Math.floor(Math.random() * types.length)];
        weatherTimer = 45; // 维持 45 秒
        weatherParticles = []; // 清空上一个天气的粒子

        if (weather === 'rain') {
          for (let i = 0; i < 120; i++) weatherParticles.push({ x: Math.random() * W, y: Math.random() * H, l: 15 + Math.random() * 25, v: 600 + Math.random() * 300 });
          addEventMsg('⛈️ 暴雨降临！雷系增强 50%，玩家移速降低！');
        } else if (weather === 'snow') {
          for (let i = 0; i < 180; i++) weatherParticles.push({ x: Math.random() * W, y: Math.random() * H, s: 2 + Math.random() * 3, vx: -60 + Math.random() * 120, vy: 60 + Math.random() * 60 });
          addEventMsg('❄️ 暴风雪席卷！火系削弱，冰系附加 20% 斩杀线！');
        } else if (weather === 'heat') {
          addEventMsg('🔥 热浪来袭！火系增强 50%，怪物移速狂暴！');
        } else {
          addEventMsg('☀️ 天气放晴，微风不燥。');
        }
      }

      // 更新天气粒子
      if (weather === 'rain') {
        weatherParticles.forEach(p => { p.y += p.v * dt; p.x += p.v * 0.15 * dt; if (p.y > H) { p.y = -p.l; p.x = Math.random() * W; } });
      } else if (weather === 'snow') {
        weatherParticles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; if (p.y > H) p.y = -5; if (p.x < 0) p.x = W; else if (p.x > W) p.x = 0; });
      }

      // ━━━ 🌀 混沌秘境控制器 ━━━
      // 从第 3 波开始，每 5 波的开头有概率刷出虚空黑洞

        }

            if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(ba) * 250, vy: Math.sin(ba) * 250, damage: e.dmg * .88, r: 8, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime });
            if (e.boss && e.phase >= 2) { for (let i = 1; i <= 2; i++) { const ba2 = ba + i * .45; if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(ba2) * 240, vy: Math.sin(ba2) * 240, damage: e.dmg * .65, r: 7, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime }); const ba3 = ba - i * .45; if (bullets.length < MAX_BULLETS) bullets.push({ wx: e.wx, wy: e.wy, vx: Math.cos(ba3) * 240, vy: Math.sin(ba3) * 240, damage: e.dmg * .65, r: 7, pierce: 0, pierceLeft: 0, hits: [], trail: [], owner: 'enemy', homing: 0, chainLeft: 0, born: gameTime }); } }

            dmgNum(player.wx, player.wy - 20, dmg, false, '#ff3030'); // 保留红色伤害跳字
          }
        }

      // 更新宝箱并检测拾取

        c.pulse += dt * 5;

        return true;
      });
      // 更新符文并检测拾取

        }

        // Mouse companion also collects

        return true;
      });
      // 更新粒子对象池
      for (let i = 0; i < particlePool.length; i++) {

        if (p.active) {

          p.wx += p.vx * dt;
          p.wy += p.vy * dt;
          p.vx *= .91;
          p.vy *= .91;

        }

        const d = dmgNumPool[i];
        if (d.active) {

          d.wy += d.vy * dt;

        }

    // ═══ DRAW ══════════════════════════════════════════════════════════════════

    // ═══ 优化后的子弹渲染引擎 ═══
    function drawBullets() {
      const highPerf = bullets.length > 60; // 同屏子弹极多时开启极速渲染
      bullets.forEach(b => {
        if (!inView(b.wx, b.wy, b.r + 5)) return;
        const ie = b.owner === 'enemy';
        const col = b.col || (ie ? '#ff5858' : '#ffd840');
        const glow = ie ? '#ff3030' : '#ff9010';

        // 渲染丝滑拖尾
        if (b.trail && b.trail.length > 1) {
          const step = highPerf ? 2 : 1;
          ctx.strokeStyle = col;
          ctx.lineCap = 'round';
          for (let i = step; i < b.trail.length; i += step) {
            const [tsx, tsy] = w2s(b.trail[i - step][0], b.trail[i - step][1]);
            const [tex, tey] = w2s(b.trail[i][0], b.trail[i][1]);
            const fr = i / b.trail.length;

            ctx.globalAlpha = fr * 0.4; // 透明度递减
            ctx.lineWidth = b.r * fr * 0.9;
            ctx.beginPath(); ctx.moveTo(tsx, tsy); ctx.lineTo(tex, tey); ctx.stroke();
          }
          ctx.globalAlpha = 1; // 🚀 统一恢复透明度，省去几十次性能昂贵的 save/restore
        }

        const [sx, sy] = w2s(b.wx, b.wy);
        ctx.save();
        if (!highPerf) { ctx.shadowBlur = ie ? 14 : 20; ctx.shadowColor = glow; }
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(sx, sy, b.r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.65)';
        ctx.beginPath(); ctx.arc(sx - b.r * .3, sy - b.r * .3, b.r * .32, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      });
    }

      visible.forEach(e => {
        const [sx, sy] = w2s(e.wx, e.wy);
        const fc = false, frz = e.frozen > 0;
        const t = e.animT;
        const r = e.r;

        // Ground shadow (ellipse under all enemies)
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(sx + 2, sy + r * 0.75, r * 0.85, r * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Freeze overlay helper
        const frzTint = (alpha) => {
          if (!frz) return;
          ctx.save();
          ctx.fillStyle = `rgba(140,210,255,${alpha})`;
          ctx.beginPath(); ctx.arc(sx, sy, r * 1.1, 0, Math.PI * 2); ctx.fill();
          // Ice crystals
          ctx.strokeStyle = 'rgba(180,230,255,0.7)'; ctx.lineWidth = 1;
          for (let i = 0; i < 6; i++) {
            const a = i * Math.PI / 3;
            ctx.beginPath();
            ctx.moveTo(sx + Math.cos(a) * r * 0.6, sy + Math.sin(a) * r * 0.6);
            ctx.lineTo(sx + Math.cos(a) * r * 1.15, sy + Math.sin(a) * r * 1.15);
            ctx.stroke();
          }
          ctx.restore();
        };

        ctx.save();
        // 🌟 史诗级受击反馈：直接使用原生的提亮滤镜！
        // 怪物被击中时，会保留眼睛、盔甲、毛发的所有细节，仅仅是整体发出极高亮度的白光！
        if (e.flash > 0) ctx.filter = 'brightness(2.5)';
        
        ctx.translate(sx, sy);

        switch (e.shape) {

          // ─── SLIME ─────────────────────────────────────────────────────────
          case 'slime': {
            const bounce = Math.sin(t * 5) * 0.14;
            const rx = r * (1 + bounce), ry = r * (1 - bounce * 0.6);

            if (fc) {
              ctx.fillStyle = '#ffffff';
              ctx.shadowBlur = 28; ctx.shadowColor = '#fff';
              ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
              break;
            }

            // Base gradient body
            // 🚀 优化：怪多时直接用纯色填充，省去巨量渐变计算
            if (useSimple) {
              ctx.fillStyle = frz ? '#60b8e0' : '#38c018';
            } else {
              const g1 = ctx.createRadialGradient(-r * 0.25, -r * 0.3, 0, 0, 0, rx);
              g1.addColorStop(0, frz ? '#d0f0ff' : '#90ff60');
              g1.addColorStop(0.55, frz ? '#60b8e0' : '#38c018');
              g1.addColorStop(1, frz ? '#2080b0' : '#186008');
              ctx.fillStyle = g1;
            }
            ctx.shadowBlur = 14; ctx.shadowColor = frz ? '#60c0ff' : e.color;
            ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Inner core glow
            const g2 = ctx.createRadialGradient(0, -r * 0.15, 0, 0, 0, r * 0.55);
            g2.addColorStop(0, frz ? 'rgba(200,240,255,0.5)' : 'rgba(180,255,130,0.45)');
            g2.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g2;
            ctx.beginPath(); ctx.ellipse(0, 0, rx * 0.8, ry * 0.8, 0, 0, Math.PI * 2); ctx.fill();

            // Specular highlight
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.beginPath(); ctx.ellipse(-r * 0.28, -ry * 0.38, r * 0.28, r * 0.16, -0.4, 0, Math.PI * 2); ctx.fill();

            // Drip (bottom)
            if (!frz) {
              const dripY = ry * 0.82 + Math.sin(t * 3.5) * 2;
              ctx.fillStyle = '#28a010';
              ctx.beginPath();
              ctx.moveTo(-r * 0.12, dripY - 2);
              ctx.quadraticCurveTo(-r * 0.08, dripY + r * 0.28, 0, dripY + r * 0.35);
              ctx.quadraticCurveTo(r * 0.08, dripY + r * 0.28, r * 0.12, dripY - 2);
              ctx.fill();
            }

            // Eyes
            const playerAngle = Math.atan2(player.wy - e.wy, player.wx - e.wx);
            const eyeOffX = Math.cos(playerAngle) * r * 0.18;
            const eyeOffY = Math.sin(playerAngle) * r * 0.12;
            const eyeR = r * 0.22;
            [{ ex: -r * 0.3, ey: -r * 0.1 }, { ex: r * 0.3, ey: -r * 0.1 }].forEach(({ ex, ey }) => {
              ctx.fillStyle = '#fff8f8';
              ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = frz ? '#2060a0' : '#1a2a08';
              ctx.beginPath(); ctx.arc(ex + eyeOffX * 0.5, ey + eyeOffY * 0.5, eyeR * 0.55, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = 'rgba(255,255,255,0.7)';
              ctx.beginPath(); ctx.arc(ex + eyeOffX * 0.3 - eyeR * 0.2, ey + eyeOffY * 0.3 - eyeR * 0.25, eyeR * 0.2, 0, Math.PI * 2); ctx.fill();
            });
            break;
          }

          // ─── GOLDEN SLIME ──────────────────────────────────────────────────
          case 'golden': {
            const bounce = Math.sin(t * 7) * 0.16;
            const rx = r * (1 + bounce), ry = r * (1 - bounce * 0.55);

            // Outer shimmer ring
            ctx.save();
            ctx.globalAlpha = 0.35 + 0.25 * Math.sin(t * 8);
            ctx.strokeStyle = '#fff8a0'; ctx.lineWidth = 3;
            ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700';
            ctx.beginPath(); ctx.ellipse(0, 0, rx + 6, ry + 6, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            const gg = ctx.createRadialGradient(-r * 0.22, -r * 0.28, 0, 0, 0, rx);
            gg.addColorStop(0, '#fffaaa');
            gg.addColorStop(0.4, '#ffd700');
            gg.addColorStop(0.8, '#c08000');
            gg.addColorStop(1, '#7a4a00');
            ctx.fillStyle = gg;
            ctx.shadowBlur = 22; ctx.shadowColor = '#ffd700';
            ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Coin-like rim
            ctx.strokeStyle = '#ffe060'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(0, 0, rx * 0.9, ry * 0.9, 0, 0, Math.PI * 2); ctx.stroke();

            // Crown
            if (!fc) {
              ctx.fillStyle = '#ffd700';
              ctx.beginPath();
              ctx.moveTo(-r * 0.55, -ry + 2);
              ctx.lineTo(-r * 0.55, -ry - r * 0.35);
              ctx.lineTo(-r * 0.28, -ry - r * 0.15);
              ctx.lineTo(0, -ry - r * 0.45);
              ctx.lineTo(r * 0.28, -ry - r * 0.15);
              ctx.lineTo(r * 0.55, -ry - r * 0.35);
              ctx.lineTo(r * 0.55, -ry + 2);
              ctx.closePath(); ctx.fill();
              ctx.strokeStyle = '#fff8a0'; ctx.lineWidth = 1; ctx.stroke();
              ['#ff4040', '#40ff80', '#4080ff'].forEach((c, i) => {
                ctx.fillStyle = c; ctx.beginPath();
                ctx.arc(-r * 0.3 + i * r * 0.3, -ry - r * 0.25, 3, 0, Math.PI * 2); ctx.fill();
              });
            }

            // Sparkling coins orbiting
            for (let i = 0; i < 3; i++) {
              const ca = t * 4 + i * Math.PI * 2 / 3;
              const cx = Math.cos(ca) * (r + 10), cy = Math.sin(ca) * (r + 10) * 0.5;
              ctx.fillStyle = `rgba(255,230,60,${0.4 + 0.3 * Math.sin(t * 5 + i)})`;
              ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
            }

            // Eyes (smug expression)
            ctx.fillStyle = '#3a2000';
            ctx.beginPath(); ctx.ellipse(-r * 0.28, -r * 0.08, r * 0.16, r * 0.1, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(r * 0.28, -r * 0.08, r * 0.16, r * 0.1, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.1, r * 0.06, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(r * 0.34, -r * 0.1, r * 0.06, 0, Math.PI * 2); ctx.fill();

            // Specular
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath(); ctx.ellipse(-r * 0.22, -ry * 0.42, r * 0.25, r * 0.14, -0.4, 0, Math.PI * 2); ctx.fill();
            break;
          }

          // ─── WOLF ──────────────────────────────────────────────────────────
          case 'wolf': {
            const angle = Math.atan2(player.wy - e.wy, player.wx - e.wx);
            const run = Math.sin(t * 10) * 0.08;
            ctx.rotate(angle);

            if (fc) {
              ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 28; ctx.shadowColor = '#fff';
              ctx.beginPath(); ctx.ellipse(0, 0, r * 1.4, r * 0.7, 0, 0, Math.PI * 2); ctx.fill();
              break;
            }

            // Body gradient (fur)
            const wg = ctx.createLinearGradient(-r, -r * 0.5, r, r * 0.5);
            wg.addColorStop(0, frz ? '#c0d8f0' : '#c8a880');
            wg.addColorStop(0.5, frz ? '#88b0d0' : '#9a7850');
            wg.addColorStop(1, frz ? '#6090b8' : '#6a5030');
            ctx.fillStyle = wg;
            ctx.shadowBlur = 12; ctx.shadowColor = frz ? '#60c0ff' : e.color;
            ctx.beginPath(); ctx.ellipse(0, run * r, r * 1.4, r * 0.68, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Belly lighter patch
            ctx.fillStyle = frz ? 'rgba(200,230,255,0.5)' : 'rgba(210,180,140,0.55)';
            ctx.beginPath(); ctx.ellipse(r * 0.12, r * 0.1 + run * r, r * 0.58, r * 0.38, 0, 0, Math.PI * 2); ctx.fill();

            // Mane / darker fur on back
            ctx.fillStyle = frz ? 'rgba(80,120,160,0.4)' : 'rgba(60,35,15,0.38)';
            ctx.beginPath(); ctx.ellipse(-r * 0.2, -r * 0.22, r * 0.72, r * 0.32, -0.3, 0, Math.PI * 2); ctx.fill();

            // Head
            const hg = ctx.createRadialGradient(r * 1.05, 0, 0, r * 1.05, 0, r * 0.7);
            hg.addColorStop(0, frz ? '#d0e8ff' : '#d4b080');
            hg.addColorStop(1, frz ? '#7aaccc' : '#7a5528');
            ctx.fillStyle = hg;
            ctx.beginPath(); ctx.ellipse(r * 1.08, 0, r * 0.62, r * 0.52, 0, 0, Math.PI * 2); ctx.fill();

            // Ears
            ctx.fillStyle = frz ? '#90c0e0' : '#8a6030';
            ctx.beginPath(); ctx.moveTo(r * 0.9, -r * 0.38); ctx.lineTo(r * 1.0, -r * 0.82); ctx.lineTo(r * 1.2, -r * 0.38); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(r * 1.1, -r * 0.3); ctx.lineTo(r * 1.25, -r * 0.72); ctx.lineTo(r * 1.42, -r * 0.3); ctx.closePath(); ctx.fill();
            ctx.fillStyle = frz ? '#c0ddf0' : '#e8a080';
            ctx.beginPath(); ctx.moveTo(r * 0.95, -r * 0.42); ctx.lineTo(r * 1.02, -r * 0.7); ctx.lineTo(r * 1.14, -r * 0.42); ctx.closePath(); ctx.fill();

            // Snout / jaws
            ctx.fillStyle = frz ? '#b8d8f0' : '#c09060';
            ctx.beginPath(); ctx.ellipse(r * 1.55, r * 0.1, r * 0.38, r * 0.26, 0, 0, Math.PI * 2); ctx.fill();

            // Teeth
            if (!frz) {
              ctx.fillStyle = '#fffff0';
              ctx.beginPath(); ctx.moveTo(r * 1.48, r * 0.04); ctx.lineTo(r * 1.52, r * 0.22); ctx.lineTo(r * 1.42, r * 0.04); ctx.closePath(); ctx.fill();
              ctx.beginPath(); ctx.moveTo(r * 1.62, r * 0.06); ctx.lineTo(r * 1.65, r * 0.24); ctx.lineTo(r * 1.55, r * 0.06); ctx.closePath(); ctx.fill();
            }

            // Eyes (glowing predator)
            const eyeCol = frz ? '#a0d8ff' : '#ff9820';
            ctx.fillStyle = '#0a0808';
            ctx.beginPath(); ctx.ellipse(r * 1.1, -r * 0.12, r * 0.14, r * 0.13, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = eyeCol;
            ctx.shadowBlur = 8; ctx.shadowColor = eyeCol;
            ctx.beginPath(); ctx.ellipse(r * 1.1, -r * 0.12, r * 0.1, r * 0.09, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#080808';
            ctx.beginPath(); ctx.arc(r * 1.1, -r * 0.12, r * 0.055, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath(); ctx.arc(r * 1.07, -r * 0.15, r * 0.035, 0, Math.PI * 2); ctx.fill();

            // Tail
            const tailAngle = Math.sin(t * 6) * 0.5;
            ctx.save(); ctx.rotate(-Math.PI * 0.1 + tailAngle);
            ctx.strokeStyle = frz ? '#90c0e0' : '#9a7050'; ctx.lineWidth = r * 0.28;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(-r * 0.8, 0); ctx.quadraticCurveTo(-r * 1.4, -r * 0.6, -r * 1.2, -r * 1.0); ctx.stroke();
            ctx.restore();

            // Legs (animated)
            const legPhase = Math.sin(t * 10);
            ctx.fillStyle = frz ? '#80b0d0' : '#8a6030';
            [0.3, 0.7].forEach((xOff, i) => {
              const ly = r * 0.52 + legPhase * r * 0.18 * (i % 2 === 0 ? 1 : -1);
              ctx.beginPath(); ctx.ellipse(-r * 0.5 + xOff * r, ly, r * 0.15, r * 0.24, 0.1, 0, Math.PI * 2); ctx.fill();
            });
            break;
          }

          // ─── GOBLIN ────────────────────────────────────────────────────────
          case 'goblin': {
            if (fc) {
              ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 28; ctx.shadowColor = '#fff';
              ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
              break;
            }

            // Body (pear shape)
            const bg = ctx.createRadialGradient(-r * 0.2, -r * 0.25, 0, 0, 0, r);
            bg.addColorStop(0, frz ? '#c0e0ff' : '#78c030');
            bg.addColorStop(0.6, frz ? '#70a8d8' : '#4a8818');
            bg.addColorStop(1, frz ? '#3a7ab0' : '#2a5008');
            ctx.fillStyle = bg;
            ctx.shadowBlur = 12; ctx.shadowColor = frz ? '#60c0ff' : e.color;
            ctx.beginPath(); ctx.ellipse(0, r * 0.1, r * 0.82, r, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Tattered vest
            if (!frz) {
              ctx.fillStyle = 'rgba(80,45,15,0.7)';
              ctx.beginPath(); ctx.moveTo(-r * 0.7, r * 0.05); ctx.lineTo(-r * 0.35, -r * 0.5); ctx.lineTo(r * 0.35, -r * 0.5); ctx.lineTo(r * 0.7, r * 0.05); ctx.lineTo(r * 0.5, r * 0.65); ctx.lineTo(-r * 0.5, r * 0.65); ctx.closePath(); ctx.fill();
              ctx.fillStyle = 'rgba(120,70,20,0.5)';
              ctx.fillRect(-r * 0.12, -r * 0.48, r * 0.24, r * 1.1);
            }

            // Head
            const hbg = ctx.createRadialGradient(-r * 0.15, -r * 1.05, 0, 0, -r * 0.85, r * 0.62);
            hbg.addColorStop(0, frz ? '#d0ecff' : '#88d838');
            hbg.addColorStop(1, frz ? '#4890c0' : '#306018');
            ctx.fillStyle = hbg;
            ctx.beginPath(); ctx.arc(0, -r * 0.8, r * 0.62, 0, Math.PI * 2); ctx.fill();

            // Ears (pointed)
            ctx.fillStyle = frz ? '#70b0d8' : '#52a020';
            [[-1, -0.45], [1, -0.45]].forEach(([sx2, sy2]) => {
              ctx.beginPath();
              ctx.moveTo(sx2 * r * 0.55, (sy2 + 0.05) * r - r * 0.8);
              ctx.lineTo(sx2 * r * 0.85, (sy2 - 0.45) * r - r * 0.8);
              ctx.lineTo(sx2 * r * 0.35, sy2 * r - r * 0.8);
              ctx.closePath(); ctx.fill();
              // inner ear
              ctx.fillStyle = frz ? '#c0ddf0' : '#e88090';
              ctx.beginPath();
              ctx.moveTo(sx2 * r * 0.55, (sy2 + 0.05) * r - r * 0.8);
              ctx.lineTo(sx2 * r * 0.75, (sy2 - 0.3) * r - r * 0.8);
              ctx.lineTo(sx2 * r * 0.42, sy2 * r - r * 0.8);
              ctx.closePath(); ctx.fill();
              ctx.fillStyle = frz ? '#70b0d8' : '#52a020';
            });

            // Big nose
            ctx.fillStyle = frz ? '#90b8d8' : '#68b010';
            ctx.beginPath(); ctx.ellipse(0, -r * 0.7, r * 0.2, r * 0.14, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#0a0808';
            ctx.beginPath(); ctx.arc(-r * 0.08, -r * 0.7, r * 0.06, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(r * 0.08, -r * 0.7, r * 0.06, 0, Math.PI * 2); ctx.fill();

            // Eyes (beady)
            [{ ex: -r * 0.3, ey: -r * 0.88 }, { ex: r * 0.3, ey: -r * 0.88 }].forEach(({ ex, ey }) => {
              ctx.fillStyle = '#0a0608';
              ctx.beginPath(); ctx.arc(ex, ey, r * 0.13, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = frz ? '#80c8ff' : '#ff3010';
              ctx.beginPath(); ctx.arc(ex, ey, r * 0.08, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = 'rgba(255,255,255,0.7)';
              ctx.beginPath(); ctx.arc(ex - r * 0.04, ey - r * 0.04, r * 0.04, 0, Math.PI * 2); ctx.fill();
            });

            // Mouth with buck teeth
            ctx.strokeStyle = '#0a0608'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.arc(0, -r * 0.58, r * 0.22, 0.1, Math.PI - 0.1); ctx.stroke();
            ctx.fillStyle = '#fffff0';
            ctx.beginPath(); ctx.rect(-r * 0.11, -r * 0.6, r * 0.1, r * 0.1); ctx.fill();
            ctx.beginPath(); ctx.rect(r * 0.01, -r * 0.6, r * 0.1, r * 0.1); ctx.fill();

            // Headband / bandana
            if (!frz) {
              ctx.fillStyle = '#a03010';
              ctx.beginPath(); ctx.ellipse(0, -r * 1.05, r * 0.62, r * 0.12, 0, 0, Math.PI * 2); ctx.fill();
              ctx.strokeStyle = '#c04020'; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.ellipse(0, -r * 1.05, r * 0.62, r * 0.12, 0, 0, Math.PI * 2); ctx.stroke();
            }

            // Tiny bow (shooting goblin)
            if (e.type === 'goblin' && !frz) {
              ctx.save(); ctx.translate(r * 0.88, 0);
              ctx.strokeStyle = '#8a5020'; ctx.lineWidth = 2; ctx.lineCap = 'round';
              ctx.beginPath(); ctx.arc(0, 0, r * 0.5, -0.9, 0.9); ctx.stroke();
              ctx.strokeStyle = '#d0c080'; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(Math.cos(-0.9) * r * 0.5, Math.sin(-0.9) * r * 0.5);
              ctx.lineTo(Math.cos(0.9) * r * 0.5, Math.sin(0.9) * r * 0.5); ctx.stroke();
              ctx.restore();
            }
            break;
          }

          // ─── ORC ───────────────────────────────────────────────────────────
          case 'orc': {
            if (fc) {
              ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 28; ctx.shadowColor = '#fff';
              ctx.fillRect(-r, -r, r * 2, r * 2);
              break;
            }
            const og = ctx.createLinearGradient(-r, -r, r, r);
            og.addColorStop(0, frz ? '#a0c8e8' : '#7a8a38');
            og.addColorStop(0.5, frz ? '#6898c0' : '#505e22');
            og.addColorStop(1, frz ? '#3060a0' : '#2a3010');
            ctx.fillStyle = og;
            ctx.shadowBlur = 14; ctx.shadowColor = frz ? '#60c0ff' : e.color;
            // Body - boxy but with rounded corners
            const rc2 = r * 0.22;
            ctx.beginPath();
            ctx.moveTo(-r + rc2, -r); ctx.lineTo(r - rc2, -r);
            ctx.arcTo(r, -r, r, -r + rc2, rc2);
            ctx.lineTo(r, r - rc2); ctx.arcTo(r, r, r - rc2, r, rc2);
            ctx.lineTo(-r + rc2, r); ctx.arcTo(-r, r, -r, r - rc2, rc2);
            ctx.lineTo(-r, -r + rc2); ctx.arcTo(-r, -r, -r + rc2, -r, rc2);
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;

            // Armor plates
            ctx.fillStyle = frz ? 'rgba(100,150,200,0.55)' : 'rgba(50,45,30,0.6)';
            ctx.beginPath(); ctx.ellipse(0, -r * 0.2, r * 0.72, r * 0.45, 0, 0, Math.PI * 2); ctx.fill();
            // Shoulder pads
            [{ x: -r * 0.92, y: -r * 0.42 }, { x: r * 0.92, y: -r * 0.42 }].forEach(({ x, y }) => {
              ctx.fillStyle = frz ? '#5088b8' : '#4a5020';
              ctx.beginPath(); ctx.ellipse(x, y, r * 0.35, r * 0.28, 0, 0, Math.PI * 2); ctx.fill();
              ctx.strokeStyle = frz ? '#90c0e0' : '#8a8040'; ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.ellipse(x, y, r * 0.35, r * 0.28, 0, 0, Math.PI * 2); ctx.stroke();
              // Spikes
              ctx.fillStyle = frz ? '#80b0d0' : '#707020';
              ctx.beginPath(); ctx.moveTo(x - r * 0.1, y - r * 0.28); ctx.lineTo(x, y - r * 0.55); ctx.lineTo(x + r * 0.1, y - r * 0.28); ctx.closePath(); ctx.fill();
            });

            // Face
            const fg = ctx.createRadialGradient(0, r * 0.2, 0, 0, r * 0.1, r * 0.72);
            fg.addColorStop(0, frz ? '#b0d0f0' : '#909848');
            fg.addColorStop(1, frz ? '#4880b0' : '#404a18');
            ctx.fillStyle = fg;
            ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.72, -Math.PI, 0); ctx.closePath(); ctx.fill();

            // Battle scars
            if (!frz) {
              ctx.strokeStyle = 'rgba(60,35,15,0.6)'; ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.moveTo(-r * 0.2, -r * 0.05); ctx.lineTo(r * 0.05, r * 0.25); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(r * 0.25, -r * 0.15); ctx.lineTo(r * 0.15, r * 0.1); ctx.stroke();
            }

            // Tusks

          // ─── MUSH ──────────────────────────────────────────────────────────

            ctx.fillStyle = '#ff0050'; ctx.shadowBlur = 20 + 15 * pulse; ctx.shadowColor = '#ff0050';
